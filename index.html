function setEqStatus(btn){
  var eqId = btn.dataset.eqid;
  var status = btn.dataset.status;
  window._eqStatus = window._eqStatus||{};
  window._eqStatus[eqId] = status;
  var readyBtn = document.getElementById('eq-ready-'+eqId);
  var mntBtn   = document.getElementById('eq-mnt-'+eqId);
  if(readyBtn){ readyBtn.style.background=status==='ready'?'var(--green)':'var(--s3)'; readyBtn.style.color=status==='ready'?'#fff':'var(--t2)'; }
  if(mntBtn){   mntBtn.style.background=status==='mnt'?'var(--red)':'var(--s3)';   mntBtn.style.color=status==='mnt'?'#fff':'var(--t2)'; }
  var commentDiv = document.getElementById('mnt-comment-'+eqId);
  if(commentDiv) commentDiv.style.display = status==='mnt'?'block':'none';
}

async function submitDemob(){
  var d   = (document.getElementById('dd')||{value:''}).value;
  var jobId = (document.getElementById('demob-jobid')||{value:''}).value;
  var well  = (document.getElementById('demob-well')||{value:''}).value;
  var pkgId = (document.getElementById('demob-pkg')||{value:''}).value;
  var mob   = (document.getElementById('demob-mob')||{value:''}).value;
  if(!d){ alert('Please select demob date'); return; }

  var eqStatusMap = window._eqStatus||{};
  var eq = window._currentJobEquipment||[];
  var mntItems = [];
  var valid = true;

  eq.forEach(function(e){
    if(eqStatusMap[e.equipmentId]==='mnt'){
      var noteEl = document.getElementById('mnt-note-'+e.equipmentId);
      var note = noteEl ? noteEl.value.trim() : '';
      if(!note){ alert('Please add MNT reason for: '+e.equipmentId); valid=false; return; }
      mntItems.push({equipmentId:e.equipmentId, equipmentType:e.type||'', reason:note});
    }
  });
  if(!valid) return;

  var btn = document.querySelector('#mbody .btn.primary');
  if(btn){ btn.textContent='Closing job...'; btn.disabled=true; }

  try{
    var res = await post({action:'demobJob', jobId:jobId, wellNumber:well,
      packageId:pkgId, department:USER.department, mobDate:mob, demobDate:d});

    if(mntItems.length>0){
      await Promise.all(mntItems.map(function(m){
        return post({action:'reportFault', jobId:jobId, packageId:pkgId,
          equipmentId:m.equipmentId, equipmentType:m.equipmentType,
          oldEquipment:m.equipmentId, newEquipment:'',
          department:USER.department, cellLeader:USER.username,
          reason:m.reason, mntManager:'Tanveer.Hussain'});
      }));
    }

    window._eqStatus={};
    closeMod();
    var mntMsg = mntItems.length>0?' '+mntItems.length+' equipment sent to MNT.':'';
    alert('✓ Job closed. Ticket '+(res.ticketId||'')+ ' created.'+mntMsg);
    Object.keys(CACHE).forEach(function(k){delete CACHE[k];});
    loadView('home');
  } catch(e){
    alert('Error: '+e.message);
    if(btn){ btn.textContent='✓ Confirm demob'; btn.disabled=false; }
  }
}

function submitFault(jobId, pkgId, btnEl){
  var o=(document.getElementById('fo')||{value:''}).value.trim();

  var t=(document.getElementById('ft')||{value:''}).value.trim();
  var r=(document.getElementById('fr')||{value:''}).value.trim();
  if(!o||!r){ alert('Please fill required fields'); return; }
  if(btnEl){ btnEl.disabled=true; btnEl.style.display='none'; }
  post({action:'reportFault', jobId:jobId, packageId:pkgId,
    equipmentId:o, equipmentType:t, oldEquipment:o, newEquipment:n,
    department:USER.department, cellLeader:USER.fullName, reason:r, mntManager:'Tanveer.Hussain'})
  .then(function(res){
    if(res.success){ alert('Fault reported.'); closeMod(); Object.keys(CACHE).forEach(function(k){delete CACHE[k];}); loadView('jobs'); }
    else { alert('Error: '+(res.error||'Failed')); if(btnEl){ btnEl.disabled=false; btnEl.style.display=''; } }
  });
}

function adminSwitchFromEl(el){
  var r={role:el.dataset.role, dept:el.dataset.dept, username:el.dataset.user, label:el.dataset.label};
  adminSwitch(r);
}

function adminSwitch(r){
  var orig = {role:USER.role, department:USER.department, username:USER.username, fullName:USER.fullName, _isAdmin:USER._isAdmin};
  USER = {
    role: r.role,
    department: r.dept,
    username: r.username,
    fullName: r.label,
    _isAdmin: true,
    _adminOrig: orig
  };
  setupNav();
  loadView('home');
}

function openAdminSwitcher(){
  // If currently acting as another role — show return to admin option
  if(USER._isAdmin && USER.role !== 'Admin'){
    openMod('<div class="modal-title">Admin Controls</div>'
      +'<button class="btn primary" onclick="returnToAdmin()" style="width:100%;margin-bottom:10px">Return to Admin Dashboard</button>'
      +'<button class="btn ghost" onclick="closeMod()" style="width:100%">Stay as '+USER.role+'</button>');
  } else {
    // Already admin — go to admin dashboard
    closeMod();
    loadView('home');

}

function returnToAdmin(){

    department: 'All',
    username: 'Admin',
    fullName: 'Admin',

  };
  closeMod();

    html += '<div><label style="font-size:10px;color:var(--t2);display:block;margin-bottom:4px">Equipment Type</label>'
      +'<select class="finput" id="rf-eqtype" style="font-size:12px">'

async function adminRunReport(){
  var type = document.getElementById('report-type').value;
  if(!type){ alert('Please select a report type'); return; }

  var dept = document.getElementById('rf-dept') ? document.getElementById('rf-dept').value : 'All';
  var status = document.getElementById('rf-status') ? document.getElementById('rf-status').value : 'All';
  var eqtype = document.getElementById('rf-eqtype') ? document.getElementById('rf-eqtype').value : 'All';
  var fromDate = document.getElementById('rf-from') ? document.getElementById('rf-from').value : '';
  var toDate = document.getElementById('rf-to') ? document.getElementById('rf-to').value : '';

  var actionMap = {
    equipment_utilization: 'getEquipmentUtilization',
    transfer_log: 'getTransferLog',
    swap_log: 'getSwapLog',
    job_requests: 'getJobRequests',
    equipment_master: 'getEquipment',
    job_log: 'getJobs',
    change_requests: 'getChangeRequests',
    mnt_log: 'getMNT',
    exemption_log: 'getExemptions',
    ticketing_log: 'getTickets'
  };

  var filenameMap = {
    equipment_utilization: 'Equipment_Utilization.csv',
    transfer_log: 'Transfer_Log.csv',
    swap_log: 'Swap_Log.csv',
    job_requests: 'Job_Requests.csv',
    equipment_master: 'Equipment_Master.csv',
    job_log: 'Job_Log.csv',
    change_requests: 'Change_Requests.csv',
    mnt_log: 'MNT_Log.csv',
    exemption_log: 'Exemption_Log.csv',
    ticketing_log: 'Ticketing_Log.csv'
  };

  var btn = document.querySelector('button[onclick="adminRunReport()"]');
  if(btn){ btn.textContent='Preparing...'; btn.disabled=true; }

  try{
    var res = await get({action:actionMap[type], department:dept}, true);
    var rawData = res.jobs||res.records||res.logs||res.utilization||res.requests||res.equipment||res.exemptions||res.tickets||res.changeRequests||[];

    // Apply filters
    var data = rawData.filter(function(r){
      if(status&&status!=='All'&&r.status&&r.status!==status) return false;
      if(eqtype&&eqtype!=='All'&&r.type&&r.type!==eqtype) return false;
      if(fromDate&&r.date&&r.date<fromDate) return false;
      if(toDate&&r.date&&r.date>toDate) return false;
      return true;
    });

    if(!data.length){ alert('No data found for selected filters'); if(btn){btn.textContent='Export CSV';btn.disabled=false;} return; }

    var keys = Object.keys(data[0]);
    var csv = [keys.join(',')].concat(data.map(function(row){
      return keys.map(function(k){ return JSON.stringify(row[k]!=null?String(row[k]):''); }).join(',');
    })).join('\n');

    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download=filenameMap[type]||'report.csv'; a.click();
    URL.revokeObjectURL(url);
    alert('Report exported: '+data.length+' records');
  }catch(e){ alert('Export error: '+e.message); }
  if(btn){ btn.textContent='Export CSV'; btn.disabled=false; }
}

async function adminExportReport(typeOrEl){
  var type = (typeof typeOrEl==='string') ? typeOrEl : (typeOrEl&&typeOrEl.dataset?typeOrEl.dataset.rtype:typeOrEl);
  var action, filename;
  if(type==='jobs'){ action='getJobs'; filename='Jobs_Report.csv'; }
  else if(type==='mnt'){ action='getMNT'; filename='MNT_Report.csv'; }
  else if(type==='transfer'){ action='getTransferLog'; filename='Transfer_Log.csv'; }
  else if(type==='utilization'){ action='getEquipmentUtilization'; filename='Utilization_Report.csv'; }

  var btn = event.target.closest('button');
  var orig = btn.innerHTML;
  btn.innerHTML='<div style="font-size:11px">Preparing...</div>';
  try{
    var res = await get({action:action, department:'All'}, true);
    var data = res.jobs||res.records||res.logs||res.utilization||[];
    if(!data.length){ alert('No data to export'); btn.innerHTML=orig; return; }
    var keys = Object.keys(data[0]);
    var csv = [keys.join(',')].concat(data.map(function(row){
      return keys.map(function(k){ return JSON.stringify(row[k]!=null?row[k]:''); }).join(',');
    })).join('\n');
    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }catch(e){ alert('Export error: '+e.message); }
  btn.innerHTML=orig;
}

async function adminSaveNewUser(){
  var username=document.getElementById('nu-user').value.trim();
  var password=document.getElementById('nu-pass').value.trim();
  var fullName=document.getElementById('nu-name').value.trim();
  var role=document.getElementById('nu-role').value;
  var dept=document.getElementById('nu-dept').value;
  if(!username||!password||!fullName){alert('Please fill all fields');return;}
  var res=await post({action:'addUser',username:username,password:password,fullName:fullName,role:role,department:dept,active:'Yes'});
  if(res.success){closeMod();alert('User '+username+' added!');loadView('home');}
  else{alert('Error: '+(res.error||'Failed'));}
}

function adminEditUser(btnEl){
  var username = btnEl.dataset ? btnEl.dataset.username : btnEl;
  var users=window._adminUsers||[];
  var u=users.find(function(x){return x.username===username;})||{username:username};
  var ROLES_LIST=['Cell Leader','Asset Manager','MNT Manager','QAQC Manager','FSM','Operation Manager','Ticketing','Admin'];
  var DEPTS=['D&WO','UC','SAWCOD','All'];
  var rolesOpts=ROLES_LIST.map(function(r){return '<option value="'+r+'"'+(r===u.role?' selected':'')+'>'+r+'</option>';}).join('');
  var deptsOpts=DEPTS.map(function(d){return '<option value="'+d+'"'+(d===u.dept?' selected':'')+'>'+d+'</option>';}).join('');
  var activeOpts='<option value="Yes"'+(u.active==='Yes'?' selected':'')+'>Yes</option><option value="No"'+(u.active==='No'?' selected':'')+'>No</option>';
  openMod('<div class="modal-title">Edit — '+username+'</div>'
    +'<div class="fg"><label class="flbl">Username</label><input type="text" class="finput" value="'+username+'" readonly style="opacity:.6"></div>'
    +'<div class="fg"><label class="flbl">Password</label><input type="text" class="finput" id="eu-pass" value="'+(u.password||'')+'"></div>'
    +'<div class="fg"><label class="flbl">Full Name</label><input type="text" class="finput" id="eu-name" value="'+(u.fullName||username)+'"></div>'
    +'<div class="fg"><label class="flbl">Role</label><select class="finput" id="eu-role">'+rolesOpts+'</select></div>'
    +'<div class="fg"><label class="flbl">Department</label><select class="finput" id="eu-dept">'+deptsOpts+'</select></div>'
    +'<div class="fg"><label class="flbl">Active</label><select class="finput" id="eu-active">'+activeOpts+'</select></div>'
    +'<input type="hidden" id="edit-username" value="'+username+'">'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn primary" style="flex:1" onclick="adminSaveEdit()">Save</button>'
    +'<button class="btn danger" style="flex:0 0 auto" onclick="adminDeleteUser()">Delete</button>'
    +'</div>');
}

async function adminSaveEdit(){
  var username=document.getElementById('edit-username')&&document.getElementById('edit-username').value||'';
  var password=document.getElementById('eu-pass').value.trim();
  var fullName=document.getElementById('eu-name').value.trim();
  var role=document.getElementById('eu-role').value;
  var dept=document.getElementById('eu-dept').value;
  var active=document.getElementById('eu-active').value;
  var res=await post({action:'editUser',username:username,password:password,fullName:fullName,role:role,department:dept,active:active});
  if(res.success){closeMod();alert('User updated!');loadView('home');}
  else{alert('Error: '+(res.error||'Update failed'));}
}

async function adminDeleteUser(){
  var username=document.getElementById('edit-username')&&document.getElementById('edit-username').value||'';
  if(!confirm('Delete user '+username+'?'))return;
  var res=await post({action:'deleteUser',username:username});
  if(res.success){closeMod();alert('User deleted');loadView('home');}
  else{alert('Error: '+(res.error||'Delete failed'));}
}
