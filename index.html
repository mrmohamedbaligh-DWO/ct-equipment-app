<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CT Equipment System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060E1C;
  --s1:#0A1628;
  --s2:#0F1E35;
  --s3:#1A2E4A;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --t1:#E2E8F0;
  --t2:#94A3B8;
  --t3:#4A6080;
  --green:#10B981;--green-bg:rgba(16,185,129,.12);--green-b:rgba(16,185,129,.25);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);--red-b:rgba(239,68,68,.25);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);--blue-b:rgba(59,130,246,.25);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.1);--amber-b:rgba(245,158,11,.25);
  --teal:#06B6D4;--teal-bg:rgba(6,182,212,.1);--teal-b:rgba(6,182,212,.25);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,.1);--purple-b:rgba(139,92,246,.25);
  --r:10px;--r2:8px;--r3:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#login-screen{align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-wrap{width:100%;max-width:360px}
.login-logo{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.login-title{font-size:22px;font-weight:700;color:var(--t1);text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:28px}
.login-card{background:var(--s2);border:1px solid var(--border2);border-radius:16px;padding:24px}
.fl-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.fl-input{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 13px;font-size:14px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:border-color .15s}
.fl-input:focus{border-color:var(--blue)}
.fl-input::placeholder{color:var(--t3)}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-login:hover{opacity:.9}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none}

/* TOPBAR */
.topbar{background:var(--s2);border-bottom:1px solid var(--border);height:54px;padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-back{width:34px;height:34px;border-radius:var(--r3);background:var(--s3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--t1);flex:1}
.tb-av{width:34px;height:34px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.role-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px}
.rc-cl{background:var(--blue-bg);color:#60A5FA;border:1px solid var(--blue-b)}
.rc-am{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.rc-mnt{background:var(--red-bg);color:#FCA5A5;border:1px solid var(--red-b)}
.rc-qa{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.rc-fsm{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.rc-op{background:var(--teal-bg);color:#67E8F9;border:1px solid var(--teal-b)}
.rc-tk{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* CONTENT */
.content{flex:1;padding:14px;overflow-y:auto;background:var(--bg);padding-bottom:72px;}
.slbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi-row.c3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.b::before{background:var(--blue)}
.kpi.a::before{background:var(--amber)}.kpi.r::before{background:var(--red)}
.kpi.t::before{background:var(--teal)}.kpi.p::before{background:var(--purple)}
.kpi:hover,.kpi.open{border-color:var(--border2)}
.kpi-lbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.kpi-tap{font-size:8px;background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--t3)}
.kpi-val{font-size:26px;font-weight:700;color:var(--t1);line-height:1;margin-bottom:3px}
.kpi-val.g{color:var(--green)}.kpi-val.b{color:var(--blue)}
.kpi-val.a{color:var(--amber)}.kpi-val.r{color:var(--red)}
.kpi-val.t{color:var(--teal)}.kpi-val.p{color:var(--purple)}
.kpi-val small{font-size:13px;font-weight:400;color:var(--t3)}
.kpi-sub{font-size:9px;color:var(--t3)}

/* EXPAND */
.expand{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.exp-head{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.exp-title{font-size:11px;font-weight:600;color:var(--t2)}
.exp-close{font-size:10px;color:var(--t3);cursor:pointer;background:var(--s3);border:1px solid var(--border2);padding:2px 8px;border-radius:4px}

/* CARD */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.card-head{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;color:var(--t2)}
.card-body{padding:12px 13px}
.crow{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--s3)}
.crow.nc{cursor:default}.crow.nc:hover{background:transparent}
.ci{width:30px;height:30px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cb{flex:1;min-width:0}
.ct2{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:10px;color:var(--t2);margin-top:2px}
.cr{flex-shrink:0;display:flex;align-items:center;gap:6px}
.chev{font-size:11px;color:var(--t3)}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:600;flex-shrink:0}
.bdg.g{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.bdg.b{background:var(--blue-bg);color:#93C5FD;border:1px solid var(--blue-b)}
.bdg.a{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.bdg.r{background:var(--red-bg);color:#FCA5A5;border:1px solid var(--red-b)}
.bdg.t{background:var(--teal-bg);color:#67E8F9;border:1px solid var(--teal-b)}
.bdg.p{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.bdg.gray{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* DEPT PILL */
.dp{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:600}
.dp.dwo{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.dp.uc{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.dp.saw{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.dp.all{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.leg{display:flex;align-items:center;gap:7px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:10px;color:var(--t2);flex:1}
.leg-val{font-size:11px;font-weight:600;color:var(--t1)}
.leg-pct{font-size:9px;color:var(--t3);min-width:28px;text-align:right}
.leg-row{display:flex;gap:8px;flex-wrap:wrap}
.leg-h{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3)}
.leg-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* UTIL BAR */
.urow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.urow:last-child{margin-bottom:0}
.upkg{font-size:10px;font-weight:600;color:var(--t2);min-width:64px;font-family:'JetBrains Mono',monospace,sans-serif}
.ubar{flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;display:flex}
.useg{height:100%}
.upct{font-size:10px;font-weight:700;color:var(--t1);min-width:32px;text-align:right}

/* PROG BAR */
.prow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prow:last-child{margin-bottom:0}
.pname{font-size:10px;color:var(--t2);min-width:80px}
.pbar{flex:1;height:7px;background:var(--s3);border-radius:999px;overflow:hidden}
.pfill{height:100%;border-radius:999px}
.ppct{font-size:10px;font-weight:700;min-width:36px;text-align:right}

/* DEPT OVERVIEW */
.drow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.dinfo{flex:1}
.dcnt{font-size:12px;font-weight:600;color:var(--t1)}
.dsub{font-size:9px;color:var(--t3);margin-top:1px}
.dutil{text-align:right}
.dutil-val{font-size:13px;font-weight:700;color:var(--green)}
.dutil-sub{font-size:9px;color:var(--t3)}

/* PKG ROW */
.pkrow{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.pkrow:last-child{border-bottom:none}
.pkrow:hover{background:var(--s3)}
.pkid{font-size:11px;font-weight:600;color:var(--t1);min-width:66px;font-family:'JetBrains Mono',monospace,sans-serif}
.pkloc{flex:1}
.pkloc-main{font-size:11px;color:var(--t1)}
.pkloc-sub{font-size:9px;color:var(--t3);margin-top:1px}

/* ALERT */
.alert{border-radius:var(--r2);padding:9px 11px;font-size:10px;display:flex;gap:7px;margin-bottom:6px;line-height:1.5}
.alert.r{background:var(--red-bg);border:1px solid var(--red-b);color:#FCA5A5}
.alert.a{background:var(--amber-bg);border:1px solid var(--amber-b);color:#FCD34D}
.alert.b{background:var(--blue-bg);border:1px solid var(--blue-b);color:#93C5FD}
.alert.g{background:var(--green-bg);border:1px solid var(--green-b);color:#6EE7B7}
.alert-icon{flex-shrink:0}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:11px 16px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:last-child{margin-bottom:0}
.btn:active{opacity:.85}
.btn.primary{background:var(--blue);color:#fff}
.btn.danger{background:var(--red);color:#fff}
.btn.success{background:var(--green);color:#fff}
.btn.warning{background:var(--amber);color:#0A1628}
.btn.ghost{background:var(--s3);color:var(--t1);border:1px solid var(--border2)}
.btn-row{display:flex;gap:8px;width:100%}.btn-row .btn{margin-bottom:0;flex:1}

/* FORM */
.fg{margin-bottom:13px}
.flbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:block}
.finput,.fselect,.ftextarea{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 12px;font-size:13px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.finput:focus,.ftextarea:focus{border-color:var(--blue)}
.finput::placeholder,.ftextarea::placeholder{color:var(--t3)}
.ftextarea{resize:none}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* BOTTOM NAV */
.bottom-nav{background:var(--s2);border-top:1px solid var(--border);display:flex;padding:6px 0 4px;flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:100;max-width:100%;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:500;transition:color .15s}
.ni.active{color:var(--blue)}
.ni-icon{font-size:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--s2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:16px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 16px;color:var(--t3);font-size:13px;gap:10px;flex-direction:column}
.spinner{width:24px;height:24px;border:2.5px solid var(--s3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 16px;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">🛢</div>
    <div class="login-title">CT Equipment System</div>
    <div class="login-sub">Sign in to access your dashboard</div>
    <div class="login-card">
      <label class="fl-label">Username</label>
      <input type="text" class="fl-input" id="lu" placeholder="Mohamed.Baligh" autocomplete="username">
      <label class="fl-label">Password</label>
      <input type="password" class="fl-input" id="lp" placeholder="••••••••" autocomplete="current-password" style="margin-bottom:0">
      <button class="btn-login" id="lbtn" onclick="doLogin()">Sign in</button>
      <div class="login-err" id="lerr">Invalid username or password</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="tb-back" id="tb-back" style="display:none" onclick="goBack()" style="cursor:pointer">←</div>
    <div class="tb-title" id="tb-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="role-chip" id="tb-chip"></span>
      <div class="tb-av" id="tb-av" onclick="USER&&USER._isAdmin?openAdminSwitcher():navTo('home')" style="cursor:pointer">U</div>
    </div>
  </div>
  <div class="content" id="mc">
    <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
  </div>
  <div class="bottom-nav" id="bnav" style="display:none">
    <div class="ni active" id="n1" onclick="navTo('home')"><div class="ni-icon">⊞</div>Home</div>
    <div class="ni" id="n2" onclick="navTo('jobs')"><div class="ni-icon">📋</div>Jobs</div>
    <div class="ni" id="n3" onclick="navTo('equipment')"><div class="ni-icon">⚙</div>Equipment</div>
    <div class="ni" id="n4" onclick="navTo('alerts')"><div class="ni-icon">🔔</div>Alerts</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="movl" onclick="closeMod(event)">
  <div class="modal" id="mbody"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxzUp3TylmC-rMZX4FqC3jcgBtENCkedeyVAfzMbnQZW_SCVTnGEphm9I9zg-ELCOj6/exec';
let USER=null,NAV=[],CACHE={},OKPI=null;
function lockBtn(btn,msg){if(!btn)return;btn.disabled=true;btn._origText=btn.textContent;btn.textContent=msg||'Processing...';btn.style.opacity='0.6';}
function unlockBtn(btn){if(!btn)return;btn.disabled=false;btn.textContent=btn._origText||btn.textContent;btn.style.opacity='';}

// ─── API ───────────────────────────────────
async function get(p,force){
  const k=JSON.stringify(p),now=Date.now();
  if(!force&&CACHE[k]&&now-CACHE[k].t<60000)return CACHE[k].d;
  const r=await fetch(API+'?'+new URLSearchParams(p));
  const d=await r.json();CACHE[k]={d,t:now};return d;
}
async function post(data){
  Object.keys(CACHE).forEach(k=>delete CACHE[k]);
  const r=await fetch(API,{method:'POST',body:JSON.stringify(data)});
  return r.json();
}
async function preload(){
  const dept=USER.department,role=USER.role;
  await Promise.all([
    get({action:'getJobs',department:dept}),
    get({action:'getEquipment',department:dept}),
    get({action:'getPMAlerts',department:dept}),
    get({action:'getMNT'}),get({action:'getTickets'}),get({action:'getExemptions'}),
    (dept==='All'||role==='Technical Engineer')&&get({action:'getPool'}),
    (dept==='All'||role==='Technical Engineer')&&get({action:'getDashboard',department:'All'}),
  ].filter(Boolean));
}

// ─── AUTH ──────────────────────────────────
async function doLogin(){
  const btn=document.getElementById('lbtn'),err=document.getElementById('lerr');
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value.trim();
  if(!u||!p)return;
  btn.textContent='Signing in...';btn.disabled=true;err.style.display='none';
  try{
    const res=await get({action:'login',username:u,password:p},true);
    if(res.success){USER=res;if(res.role==='Admin')USER._isAdmin=true;showApp();}
    else{err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
  }catch(e){err.textContent='Connection error';err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
}
document.getElementById('lp').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});

// ─── APP ───────────────────────────────────
async function showApp(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const init=USER.role==='Admin'?'🔑':USER.fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const av=document.getElementById('tb-av');
  av.textContent=init;
  av.style.fontSize=USER._isAdmin?'18px':'12px';
  if(USER._isAdmin)av.onclick=function(){openAdminSwitcher();};
  const rm={'Cell Leader':'rc-cl','Asset Manager':'rc-am','MNT Manager':'rc-mnt','QAQC Manager':'rc-qa','FSM':'rc-fsm','Operation Manager':'rc-op','Ticketing':'rc-tk','Technical Engineer':'rc-op','Admin':'rc-am'};
  const chip=document.getElementById('tb-chip');
  const isActing=USER._isAdmin&&USER.role!=='Admin';
  chip.textContent=USER.role+(isActing?' [Admin]':'');
  chip.className='role-chip '+(rm[USER.role]||'rc-tk');
  setupNav();
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading your data...</span></div>';
  await preload();loadView('home');
}

function setupNav(){
  const nav=document.getElementById('bnav'),role=USER.role;
  if(role==='Ticketing'){nav.innerHTML=`<div class="ni active" id="n1" onclick="navTo('home')"><div class="ni-icon">🎫</div>Tickets</div><div class="ni" id="n2" onclick="navTo('history')"><div class="ni-icon">📋</div>History</div>`;}

function navTo(v,p){
  NAV=[{v,p}];
  document.getElementById('tb-back').style.display='none';
  document.getElementById('tb-title').textContent='Dashboard';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const h=document.getElementById('n1');if(h)h.classList.add('active');
  // Restore bottom nav visibility
  document.getElementById('bnav').style.display='flex';
  loadView(v,p);
}
function pushView(v,p,title){
  NAV.push({v,p,title});
  const back=document.getElementById('tb-back');
  back.style.display='flex';
  if(title)document.getElementById('tb-title').textContent=title;
  loadView(v,p,title);
}
function goBack(){
  if(NAV.length>1){
    NAV.pop();
    const prev=NAV[NAV.length-1];
    if(NAV.length===1){
      document.getElementById('tb-back').style.display='none';
      document.getElementById('tb-title').textContent='Dashboard';
    }else{
      document.getElementById('tb-title').textContent=prev.title||'Dashboard';
    }
    loadView(prev.v,prev.p,prev.title);
  }else{
    navTo('home');
  }
}
async function loadView(v,p,title){
  OKPI=null;const c=document.getElementById('mc');
  c.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  if(title)document.getElementById('tb-title').textContent=title;
  // Always keep bottom nav visible
  const bnav=document.getElementById('bnav');
  if(bnav)bnav.style.display='flex';
  try{
    if(v==='home')await renderHome(c);
    else if(v==='jobs')await renderJobs(c);
    else if(v==='equipment')await renderEq(c);
    else if(v==='alerts')await renderAlerts(c);
    else if(v==='mntlist')await renderMNTList(c);
    else if(v==='job-detail')await renderJobDetail(c,p);
    else if(v==='create-job')renderCreateJob(c);
    else if(v==='history')await renderHistory(c);
    else if(v==='edit-request')await renderEditRequest(c,p);
    else c.innerHTML='<div class="empty">Not found</div>';
  }catch(e){c.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

// ─── DONUT SVG HELPER ──────────────────────
function donut(data,total,cx,cy,r,sw){
  // data = [{val,color}]
  const circ=2*Math.PI*r;
  let offset=-(circ/4);
  let segs='';
  data.forEach(d=>{
    const dash=(d.val/total)*circ;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${offset}" stroke-linecap="butt"/>`;
    offset-=dash;
  });
  return segs;
}

async function approveFault(crId,btnEl){
  if(btnEl&&btnEl.disabled)return;
  if(btnEl){btnEl.disabled=true;btnEl.textContent='...';}
  try{
    const res=await post({action:'approveChange',crId,role:USER.role,reason:''});
    if(res.success){Object.keys(CACHE).forEach(k=>delete CACHE[k]);loadView('home');}
    else{if(btnEl){btnEl.disabled=false;btnEl.textContent='✓';}alert('Error: '+(res.error||'?'));}
  }catch(e){if(btnEl){btnEl.disabled=false;btnEl.textContent='✓';}alert('Error');}
}
function rejectFault(crId,btnEl){
  openRejModal('Reject fault report',async(reason)=>{

}

async function renderFSM(c){
  let jR={jobs:[]},pmR={alerts:[]},reqR={requests:[]},crR={changeRequests:[]},exR={exemptions:[]};

      get({action:'getExemptions'})

  }catch(e){console.error('FSM fetch error',e);}
  const jobs=jR.jobs||[],running=jobs.filter(j=>j.status==='Running'||j.status==='Exemption'),done=jobs.filter(j=>j.status==='Completed');
  const reqs=(reqR&&reqR.requests)||[];
  const pendingFSM=reqs.filter(r=>r.status==='Pending FSM'&&r.department===USER.department);
  // Ticket stats per month
  const tktR2=await get({action:'getTickets'}).catch(()=>({tickets:[]}));
  const deptTickets=(tktR2.tickets||[]).filter(t=>t.department===USER.department);
  const mStats={};
  deptTickets.forEach(t=>{
    if(!t.completionDate)return;
    const m=t.completionDate.slice(0,7);
    if(!mStats[m])mStats[m]={total:0,done:0};
    mStats[m].total++;
    if(t.status==='Done')mStats[m].done++;
  });
  const months=Object.keys(mStats).sort().slice(-4);
  const maxT=Math.max(...months.map(m=>mStats[m].total),1);
  // Running jobs deduped
  const seenFSM={};
  const runningFSM=jobs.filter(j=>{
    if(j.status!=='Running'&&j.status!=='Exemption')return false;

    seenFSM[j.jobId]=true;return true;
  });
  const _pmRaw=(pmR.alerts||[]).filter(a=>a.daysLeft<=30);const _pmSeen=new Set();const pm=_pmRaw.filter(a=>{const k=a.equipmentId+a.pmType;if(_pmSeen.has(k))return false;_pmSeen.add(k);return true;});
  // Package utilization
  // Deduplicate jobs by jobId
  const seenJobs={};
  const uniqueJobs=jobs.filter(j=>{if(seenJobs[j.jobId])return false;seenJobs[j.jobId]=true;return true;});
  const pkgUtil={};
  uniqueJobs.forEach(j=>{
    if(!pkgUtil[j.packageId])pkgUtil[j.packageId]={onJob:0,mnt:0,pool:0,total:0};
    (j.equipment||[]).forEach(e=>{
      pkgUtil[j.packageId].total++;
      if(e.status==='Running'||e.status==='Exemption')pkgUtil[j.packageId].onJob++;
      else if(e.status==='Under MNT')pkgUtil[j.packageId].mnt++;
      else pkgUtil[j.packageId].pool++;

  });
  const runningUnique=uniqueJobs.filter(j=>j.status==='Running'||j.status==='Exemption');
  c.innerHTML=`
  <div class="kpi-row">
    <div class="kpi g" onclick="toggleKPI('fsm-run')"><div class="kpi-lbl">Jobs running <span class="kpi-tap">tap ▸</span></div><div class="kpi-val g">${running.length}</div><div class="kpi-sub">${USER.department}</div></div>
    <div class="kpi b" onclick="toggleKPI('fsm-done')"><div class="kpi-lbl">Completed <span class="kpi-tap">tap ▸</span></div><div class="kpi-val b">${done.length}</div><div class="kpi-sub">this year</div></div>
    <div class="kpi a" onclick="toggleKPI('fsm-pending')" style="grid-column:1/-1"><div class="kpi-lbl">Pending FSM approval <span class="kpi-tap">tap ▸</span></div><div class="kpi-val a">${pendingFSM.length}</div><div class="kpi-sub">job requests waiting for you</div></div>
  ${mkFaultKpi((crR.changeRequests||[]).filter(r=>r.amDecision==='Approved'&&(!r.fsmDecision||r.fsmDecision==='Pending')&&r.department===USER.department))}
  ${mkExKpi((exR.exemptions||[]).filter(e=>(!e.fsmDecision||e.fsmDecision==='Pending')&&e.department===USER.department),'fsmDecision',true,'📋 Exemptions pending')}
  ${mkExKpi((exR.exemptions||[]).filter(e=>e.department===USER.department),'fsmDecision',false,'📋 All exemptions')}
  </div>
  <div id="fsm-pending" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Job requests — pending your approval</span><span class="exp-close" onclick="toggleKPI('fsm-pending')">close</span></div>
    ${pendingFSM.length===0?'<div class="empty">No pending requests</div>':pendingFSM.map(r=>`
      <div style="padding:12px 13px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600;color:var(--t1)">${r.requestId} — ${r.packageId}</span>
          <span class="bdg b">Pending FSM</span>
        </div>
        <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${r.cellLeader} · ${r.wellNumber} / ${r.rigNumber} · Mob ${r.mobDate}</div>
        <div style="font-size:10px;color:var(--green);margin-bottom:8px">AM Approved ✓ ${r.amDate}</div>
        <div style="font-size:10px;color:var(--t2);margin-bottom:6px">Equipment: ${(r.equipmentList||[]).join(', ')}</div>
        <textarea class="ftextarea" id="fsm-note-${r.requestId}" rows="1" placeholder="Notes (optional)..." style="margin-bottom:8px"></textarea>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn success" style="flex:1;padding:11px;font-size:13px;margin-bottom:0" onclick="approveReq('${r.requestId}','FSM',document.getElementById('fsm-note-${r.requestId}').value,this)">✓ Approve</button>
          <button class="btn danger" style="flex:1;padding:11px;font-size:13px;margin-bottom:0" onclick="rejectReq('${r.requestId}','FSM',document.getElementById('fsm-note-${r.requestId}').value,this)">✗ Reject</button>
        </div>
      </div>`).join('')}
  </div></div>
  ${runningFSM.length>0?`
  <div class="slbl">Package utilization — ${USER.department}</div>
  <div class="card"><div class="card-body">
    <div class="leg-row" style="margin-bottom:10px">
      <div class="leg-h"><div class="leg-sq" style="background:var(--green)"></div>On Job</div>
      <div class="leg-h"><div class="leg-sq" style="background:var(--red)"></div>MNT</div>
      <div class="leg-h"><div class="leg-sq" style="background:var(--blue)"></div>Pool</div>
    </div>
    ${[...new Map(running.map(j=>[j.packageId,j])).values()].map(j=>{const u=pkgUtil[j.packageId]||{onJob:0,mnt:0,pool:0,total:1};const t=u.total||1;const op=Math.round(u.onJob/t*100),mp=Math.round(u.mnt/t*100),pp=Math.round(u.pool/t*100);return`
      <div class="urow">
        <div class="upkg">${j.packageId}</div>
        <div class="ubar">
          <div class="useg" style="width:${op}%;background:var(--green)"></div>
          <div class="useg" style="width:${mp}%;background:var(--red)"></div>
          <div class="useg" style="width:${pp}%;background:var(--blue)"></div>
        </div>
        <div class="upct" style="color:${op>70?'var(--green)':op>50?'var(--amber)':'var(--red)'}">${op}%</div>
      </div>`;}).join('')}
  </div></div>`:''}
  <div id="fsm-run" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Running jobs</span><span class="exp-close" onclick="toggleKPI('fsm-run')">close</span></div>
    ${running.map(j=>`<div class="crow" onclick="pushView('job-detail',${JSON.stringify(j).replace(/"/g,'&quot;')},'${j.jobId}')"><div class="cb"><div class="ct2">${j.jobId} · ${j.wellNumber} / ${j.rigNumber}</div><div class="cs">${j.packageId} · ${j.mobDate} · ${j.daysOnJob||'?'} days</div></div><div class="cr"><span class="bdg ${j.status==='Exemption'?'a':'g'}">${j.status}</span><span class="chev">›</span></div></div>`).join('')}
    ${running.length===0?'<div class="empty">No running jobs</div>':''}
  </div></div>
  <div id="fsm-done" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Completed jobs</span><span class="exp-close" onclick="toggleKPI('fsm-done')">close</span></div>
    ${done.map(j=>`<div class="crow nc"><div class="cb"><div class="ct2">${j.jobId} · ${j.wellNumber}</div><div class="cs">${j.mobDate} → ${j.demobDate}</div></div><span class="bdg b">Done</span></div>`).join('')}
    ${done.length===0?'<div class="empty">No completed jobs</div>':''}

  ${pm.length>0?`<div class="divider"></div><div class="slbl">PM alerts — ${USER.department}</div>${pm.map(a=>`<div class="alert ${a.status==='Overdue'?'r':'a'}"><span class="alert-icon">${a.status==='Overdue'?'🔴':'⚠️'}</span><div><strong>${a.equipmentId}</strong> ${a.pmType} — <strong>${a.dueDate}</strong> — ${a.status==='Overdue'?'OVERDUE':a.daysLeft+' days'}</div></div>`).join('')}`:''}

async function renderOP(c){

  const pool=poolR.pool||{};

  const TOTAL_PKGS=14;
  const pkgsOnJob=runningJobs.filter(j=>j.status==='Running').length;

  const pkgsMNT=Math.round((mntPerf.reduce((s,m)=>s+m.underMnt,0)/_totalEq)*TOTAL_PKGS);
  const totalPool=Math.max(0,TOTAL_PKGS-pkgsOnJob-pkgsExemption-pkgsMNT);

    if(mo===curMonth){if(!deptFM[d])deptFM[d]=0;deptFM[d]+=t.amount;}

async function renderTK(c){
  let res={tickets:[]};
  try{ res=await get({action:'getTickets'}); }catch(e){ console.error('TK fetch error',e); }
  const tickets=res.tickets||[];
  const notAck=tickets.filter(t=>t.status==='Not Acknowledged');
  const acked=tickets.filter(t=>t.status==='Acknowledged');
  const done=tickets.filter(t=>t.status==='Done');
  // Monthly stats
  const mStats={};
  tickets.forEach(t=>{
    if(!t.completionDate)return;
    const m=t.completionDate.slice(0,7);
    if(!mStats[m])mStats[m]={total:0,done:0,amount:0,byDept:{}};
    mStats[m].total++;if(t.status==='Done'){mStats[m].done++;mStats[m].amount+=(t.amount||0);}
    const d=t.department||'Other';
    if(!mStats[m].byDept[d])mStats[m].byDept[d]={total:0,done:0,amount:0};
    mStats[m].byDept[d].total++;if(t.status==='Done'){mStats[m].byDept[d].done++;mStats[m].byDept[d].amount+=(t.amount||0);}
  });
  const months=Object.keys(mStats).sort().slice(-6);
  const maxT=Math.max(...months.map(m=>mStats[m].total),1);
  const total=tickets.length||1;
  c.innerHTML=`
  <div class="kpi-row c3">
    <div class="kpi r" onclick="toggleKPI('tk-na')"><div class="kpi-lbl">Not ack'd</div><div class="kpi-val r">${notAck.length}</div><div class="kpi-sub">tap ▸</div></div>
    <div class="kpi b" onclick="toggleKPI('tk-ac')"><div class="kpi-lbl">In progress</div><div class="kpi-val b">${acked.length}</div><div class="kpi-sub">tap ▸</div></div>
    <div class="kpi g" onclick="toggleKPI('tk-dn')"><div class="kpi-lbl">Done</div><div class="kpi-val g">${done.length}</div><div class="kpi-sub">tap ▸</div></div>
  </div>
  <!-- Status donut -->
  <div class="slbl">Ticket status</div>
  <div class="card"><div class="card-body">
    <div class="donut-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0">
        <circle cx="50" cy="50" r="38" fill="none" stroke="var(--s3)" stroke-width="14"/>
        ${donut([{val:notAck.length,color:'var(--red)'},{val:acked.length,color:'var(--blue)'},{val:done.length,color:'var(--green)'}],total,50,50,38,14)}
        <text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="var(--t1)">${total}</text>
        <text x="50" y="58" text-anchor="middle" font-size="8" fill="var(--t3)">total</text>
      </svg>
      <div class="donut-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--red)"></div><div class="leg-lbl">Not acknowledged</div><div class="leg-val">${notAck.length}</div></div>
        <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div><div class="leg-lbl">In progress</div><div class="leg-val">${acked.length}</div></div>
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div><div class="leg-lbl">Done</div><div class="leg-val">${done.length}</div></div>
      </div>
    </div>
  </div></div>
  <div id="tk-na" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Not acknowledged</span><span class="exp-close" onclick="toggleKPI('tk-na')">close</span></div>
    ${notAck.length===0?'<div class="empty">All acknowledged ✓</div>':notAck.map(t=>`
      <div style="padding:10px 13px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:600;color:var(--t1)">${t.ticketId}</span><span class="bdg r">Pending</span></div>
        <div style="font-size:10px;color:var(--t2);margin-bottom:8px">${t.jobId} · ${t.wellNumber} · ${t.packageId}<br>Completed ${t.completionDate}</div>

      </div>`).join('')}

    <div class="exp-head"><span class="exp-title">In progress</span><span class="exp-close" onclick="toggleKPI('tk-ac')">close</span></div>

        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end;cursor:pointer" onclick="showMonthDetail('${m}')">
          <div style="font-size:9px;font-weight:600;color:var(--t2)">${mStats[m].total}</div>

            <div style="flex:${dp};background:var(--green)"></div>

function showMonthDetail(m){
  const el=document.getElementById('mdetail'),s=window._mStats||{};
  if(!el||!s[m])return;
  el.style.display='block';
  var _mh='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--t1)">'+m+'</span><span style="font-size:11px;color:var(--green)">SAR '+(s[m].amount||0).toLocaleString()+'</span></div><div style="font-size:10px;color:var(--t2);margin-bottom:8px">'+s[m].done+'/'+s[m].total+' done</div>';
  Object.entries(s[m].byDept).forEach(function(e){var dept=e[0],ds=e[1],pct=ds.total>0?Math.round(ds.done/ds.total*100):0,bg=ds.done===ds.total&&ds.total>0?'var(--green)':'var(--amber)',dc=dept==='D&WO'?'dwo':dept==='UC'?'uc':'saw';_mh+='<div class="prow" style="margin-bottom:8px"><div class="pname"><span class="dp '+dc+'">'+dept+'</span></div><div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+bg+'"></div></div><div class="ppct" style="color:var(--t2)">'+ds.done+'/'+ds.total+'</div></div>'+(ds.amount>0?'<div style="font-size:10px;color:var(--green);margin-top:-4px;margin-bottom:6px;padding-left:4px">SAR '+ds.amount.toLocaleString()+'</div>':'');});
  el.innerHTML=_mh;
}

function loadPkgComps(pkgId){
  const el=document.getElementById('pkg-comps');
  const btn=document.getElementById('cj-submit');
  if(!pkgId){if(el)el.innerHTML='';if(btn)btn.style.display='none';return;}
  const pool=window._poolData||{};
  const pkg=(window._pkgData||[]).find(p=>p.pkgId===pkgId);
  if(!pkg){if(el)el.innerHTML='';if(btn)btn.style.display='none';return;}
  const order=['Control Cabin','Power Pack','Injector','Goose Neck','Gooseneck','Stripper','Work Reel','BOP','Fluid Pump','N2 Pump','Tool Box','Toolbox'];
  const sorted=[...pkg.equipment].sort((a,b)=>{
    return (order.indexOf(a.type)<0?99:order.indexOf(a.type))-(order.indexOf(b.type)<0?99:order.indexOf(b.type));
  });
  const typeCnt={};sorted.forEach(e=>{typeCnt[e.type]=(typeCnt[e.type]||0)+1;});
  const typeIdx={};
  let rows='';
  sorted.forEach(eq=>{
    typeIdx[eq.type]=(typeIdx[eq.type]||0)+1;
    const idx=typeIdx[eq.type];
    const cnt=typeCnt[eq.type];
    const selId='eq-sel-'+eq.type.replace(/[^a-zA-Z0-9]/g,'')+idx;
    const poolItems=(pool[eq.type]||[]).filter(p=>p.id!==eq.equipmentId);
    const label=eq.type+(cnt>1?' '+idx:'');
    rows+='<div style="padding:9px 13px;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:11px;font-weight:600;color:var(--t1)">'+label+'</span><span style="font-size:10px;color:var(--t2);font-family:monospace">'+eq.equipmentId+'</span></div><select class="finput" id="'+selId+'" style="font-size:12px;padding:8px 10px;cursor:pointer"><option value="'+eq.equipmentId+'">'+eq.equipmentId+' (default)</option>'+poolItems.map(p=>'<option value="'+p.id+'">'+p.id+' (pool)</option>').join('')+'<option value="__EMPTY__">— Leave empty —</option></select></div>';
  });
  el.innerHTML='<div class="slbl" style="margin-bottom:8px">Package equipment</div><div class="card" style="margin-bottom:10px">'+rows+'</div>';
  window._currentPkgEquipment=sorted;
  window._currentPkg=pkg;
  if(btn)btn.style.display='flex';
  if(window._editReq&&btn){btn.textContent='Resubmit for approval';btn.onclick=submitResubmit;}
}

// loadPkgComps variant that pre-selects original equipment from the request
function loadPkgCompsEdit(pkgId, origEqList){
  window._origEqList=origEqList||[];
  loadPkgComps(pkgId);
  // After loadPkgComps renders, pre-select original equipment
  setTimeout(()=>{
    const orig=window._origEqList||[];
    if(!orig.length)return;
    const sortedEq=window._currentPkgEquipment||[];
    const typeIdx={};
    sortedEq.forEach(eq=>{
      typeIdx[eq.type]=(typeIdx[eq.type]||0)+1;
      const selId='eq-sel-'+eq.type.replace(/[^a-zA-Z0-9]/g,'')+typeIdx[eq.type];
      const sel=document.getElementById(selId);
      if(!sel)return;
      // Find matching original equipment for this slot
      // Try to match by position in type group
      const typeCount=typeIdx[eq.type];
      const origForType=orig.filter(id=>{
        // Check if this id was in the original list and matches type
        const pkg=window._pkgData||[];
        for(const p of pkg){
          const found=p.equipment.find(e=>e.equipmentId===id&&e.type===eq.type);
          if(found)return true;
        }
        // Fallback: just check pool
        const pool=window._poolData||{};
        const poolItems=pool[eq.type]||[];
        return poolItems.some(p=>p.id===id);
      });
      const origVal=origForType[typeCount-1];
      if(origVal){
        // Check if option exists in select
        const opts=Array.from(sel.options).map(o=>o.value);
        if(opts.includes(origVal)){sel.value=origVal;}
      }
    });
  },300);
}
async function deleteRequest(requestId,btnEl){
  const btn=btnEl||event.target;
  if(btn&&btn.disabled)return;
  if(!confirm('Delete request '+requestId+'? This cannot be undone.'))return;
  lockBtn(btn,'Deleting...');
  try{
    const res=await post({action:'deleteJobRequest',requestId});
    if(res.success){alert('Request deleted.');Object.keys(CACHE).forEach(k=>delete CACHE[k]);loadView('home');}
    else{unlockBtn(btn);alert('Error: '+(res.error||'Unknown'));}
  }catch(e){unlockBtn(btn);alert('Connection error: '+e.message);}
}

async function submitResubmit(){
  const req=window._editReq;
  if(!req){alert('Error: request not found');return;}
  const well=(document.getElementById('cj-w')||{value:''}).value.trim();
  const rig=(document.getElementById('cj-r')||{value:''}).value.trim();
  const pkgId=(document.getElementById('cj-p')||{value:''}).value;
  const mob=(document.getElementById('cj-m')||{value:''}).value;
  if(!well||!rig||!pkgId||!mob){alert('Please fill all required fields');return;}
  // Collect selected equipment from dropdowns
  let selectedEq=[];
  const sortedEq=window._currentPkgEquipment||[];
  if(sortedEq.length>0){
    const typeIdx={};
    selectedEq=sortedEq.map(eq=>{
      typeIdx[eq.type]=(typeIdx[eq.type]||0)+1;
      const selId='eq-sel-'+eq.type.replace(/[^a-zA-Z0-9]/g,'')+typeIdx[eq.type];
      const sel=document.getElementById(selId);
      const val=sel?sel.value:eq.equipmentId;
      return val==='__EMPTY__'?null:val;
    }).filter(Boolean);
  }
  // Fallback: use original equipment list if no dropdowns rendered
  if(selectedEq.length===0){
    selectedEq=req.equipmentList||[];
  }
  if(selectedEq.length===0){alert('No equipment selected');return;}
  const btn=document.getElementById('cj-submit');
  if(btn){btn.textContent='Submitting...';btn.disabled=true;}
  try{
    const res=await post({
      action:'resubmitJobRequest',
      requestId:req.requestId,
      packageId:pkgId,
      wellNumber:well,
      rigNumber:rig,
      mobDate:mob,
      equipmentList:selectedEq
    });
    if(res.success){
      alert('Request '+res.requestId+' resubmitted! Waiting for Asset Manager approval.');
      Object.keys(CACHE).forEach(k=>delete CACHE[k]);
      goBack();loadView('home');
    }else{
      alert('Error: '+(res.error||'Unknown error — check Apps Script logs'));
      if(btn){btn.textContent='↻ Resubmit for approval';btn.disabled=false;}
    }
  }catch(e){
    alert('Connection error: '+e.message);
    if(btn){btn.textContent='↻ Resubmit for approval';btn.disabled=false;}
  }
}

function updateReplDD(sel){
  if(!sel)return;
  const tm={'CC':'Control Cabin','PP':'Power Pack','IJ':'Injector','GK':'Gooseneck','GN':'Gooseneck','SB':'Stripper','ST':'Stripper','WR':'Work Reel','BP':'BOP','PU':'Fluid Pump','FP':'Fluid Pump','N2':'N2 Pump','TB':'Tool Box'};
  const eq=(window._faultEq||[]).find(e=>e.equipmentId===sel);
  const px=sel.slice(0,2).toUpperCase();
  const tp=(eq&&eq.type)||tm[px]||'';
  const ft=document.getElementById('ft');if(ft)ft.value=tp;
  const pool=window._faultPool||{};let reps=[];
  Object.entries(pool).forEach(([t,items])=>{if(t===tp||items.some(i=>i.id&&i.id.slice(0,2).toUpperCase()===px))reps=reps.concat(items);});
  const fn=document.getElementById('fn');
  if(fn)fn.innerHTML=reps.length?'<option value="">— Select —</option>'+reps.map(i=>`<option value="${i.id}">${i.id}</option>`).join(''):'<option value="">None available</option>';
}

  openMod(`<div class="modal-title">Enter demob date</div>
    <div class="fg"><label class="flbl">Demob date</label><input type="date" class="finput" id="dd" value="${new Date().toISOString().split('T')[0]}"></div>
    <button class="btn primary" onclick="submitDemob('${jobId}','${well}','${pkgId}','${mob}')">Confirm demob — close job</button>`);
}
async function submitDemob(jobId,well,pkgId,mob){
  const d=document.getElementById('dd').value;if(!d)return;
  const res=await post({action:'demoJob',jobId,wellNumber:well,packageId:pkgId,department:USER.department,mobDate:mob,demobDate:d});
  document.getElementById('movl').classList.remove('open');
  alert(`Job closed. Ticket ${res.ticketId} created.`);loadView('home');
}

function openExemptionModal(jobId,pkgId){
  const eq=window._currentJobEquipment||[];
  const opts=eq.map(e=>`<option value="${e.equipmentId}">${e.equipmentId}</option>`).join('');
  openMod(`<div class="modal-title">Request exemption</div>
    <div class="fg"><label class="flbl">Equipment ID</label>
      <select class="finput" id="ee" style="cursor:pointer"><option value="">— Select —</option>${opts}</select></div>
    <div class="fg"><label class="flbl">Reason</label>
      <textarea class="ftextarea" id="er" rows="3" placeholder="Why can't this be replaced?"></textarea></div>
    <button class="btn warning" id="seBtn" onclick="submitExemption('${jobId}','${pkgId}',this)">Submit exemption request</button>`);
}
async function submitExemption(jobId,pkgId,btnEl){
  const e=document.getElementById('ee').value.trim(),r=document.getElementById('er').value.trim();
  if(!e||!r)return alert('Please fill all fields');
  const sb=btnEl||document.getElementById('seBtn');if(sb){sb.disabled=true;sb.style.display='none';}
  const res=await post({action:'requestExemption',jobId,packageId:pkgId,equipmentId:e,department:USER.department,reason:r});
  document.getElementById('movl').classList.remove('open');
  alert(`Exemption ${res.exemptionId} submitted to 4 approvers.`);loadView('home');
}

async function submitJob(){ submitJobRequest(); }

async function submitJobRequest(){
  const well  = (document.getElementById('cj-w')||{value:''}).value.trim();
  const rig   = (document.getElementById('cj-r')||{value:''}).value.trim();
  const pkgId = (document.getElementById('cj-p')||{value:''}).value;
  const mob   = (document.getElementById('cj-m')||{value:''}).value;
  if(!well||!rig||!pkgId||!mob){ alert('Please fill all required fields'); return; }
  const pkg = window._currentPkg || (window._pkgData||[]).find(p=>p.pkgId===pkgId);
  if(!pkg){ alert('Please select a package first'); return; }
  const sortedEq = window._currentPkgEquipment || pkg.equipment || [];
  const typeIdx = {};
  const selectedEq = sortedEq.map(eq=>{
    typeIdx[eq.type] = (typeIdx[eq.type]||0)+1;
    const selId = 'eq-sel-' + eq.type.replace(/[^a-zA-Z0-9]/g,'') + typeIdx[eq.type];
    const sel = document.getElementById(selId);
    const val = sel ? sel.value : eq.equipmentId;
    return val === '__EMPTY__' ? null : val;
  }).filter(Boolean);
  const btn = document.getElementById('cj-submit');
  if(btn&&btn.disabled)return;
  if(btn){lockBtn(btn,'Submitting...');}
  try {
    const res = await post({
      action:'submitJobRequest',
      packageId:pkgId, ctuNumber:pkg.ctuNumber||'',
      department:USER.department, cellLeader:USER.username,
      wellNumber:well, rigNumber:rig, mobDate:mob,
      equipmentList:selectedEq
    });
    if(res.success){
      alert('Job request '+res.requestId+' submitted! Waiting for Asset Manager approval.');
      goBack(); loadView('home');
    } else {
      alert('Error: '+(res.error||'Unknown'));
      if(btn){ btn.textContent='Submit for Asset Manager approval'; btn.disabled=false; }
    }
  } catch(e){
    alert('Connection error. Please try again.');
    if(btn){ btn.textContent='Submit for Asset Manager approval'; btn.disabled=false; }
  }
}

async function approveReq(requestId, role, notes, btnEl){
  const btn=btnEl||event.target;
  if(btn&&btn.disabled)return;
  lockBtn(btn,'Approving...');
  try {
    const res = await post({ action:'approveJobRequest', requestId, role, notes: notes||'' });
    if(res.success){
      alert(role==='FSM' ? 'Approved! Job is now Running.' : 'Approved! Sent to FSM for confirmation.');
      Object.keys(CACHE).forEach(k=>delete CACHE[k]);
      loadView('home');
    } else { unlockBtn(btn); alert('Error: '+(res.error||'Unknown')); }
  } catch(e){ unlockBtn(btn); alert('Connection error. Try again.'); }
}

async function rejectReq(requestId, role, notes, btnEl){
  const btn=btnEl||event.target;
  if(btn&&btn.disabled)return;
  if(!notes){ alert('Please enter a reason for rejection'); return; }
  lockBtn(btn,'Rejecting...');
  try {
    const res = await post({ action:'rejectJobRequest', requestId, role, notes });
    if(res.success){
      alert('Request rejected.');
      Object.keys(CACHE).forEach(k=>delete CACHE[k]);
      loadView('home');
    } else { unlockBtn(btn); alert('Error: '+(res.error||'Unknown')); }
  } catch(e){ unlockBtn(btn); alert('Connection error. Try again.'); }
}

async function markMNTDone(mntId,eqId){const btn=event.target;if(btn&&btn.disabled)return;lockBtn(btn,'Sending...');try{await post({action:'markMNTDone',mntId,equipmentId:eqId});alert(`${eqId} done → sent to QAQC.`);loadView('home');}catch(e){unlockBtn(btn);alert('Connection error.');}}
async function qaqcDec(mntId,dec){const btn=event.target;if(btn&&btn.disabled)return;lockBtn(btn,dec==='Approved'?'Approving...':'Rejecting...');try{const r=document.getElementById('qr-'+mntId)?.value||'';await post({action:'qaqcDecision',mntId,decision:dec,reason:r});alert(dec==='Approved'?'Approved → Pool':'Rejected → MNT');loadView('home');}catch(e){unlockBtn(btn);alert('Connection error.');}}
async function ackTkt(id){const btn=event.target;if(btn&&btn.disabled)return;lockBtn(btn,'Acknowledging...');try{await post({action:'acknowledgeTicket',ticketId:id});alert('Ticket acknowledged.');loadView('home');}catch(e){unlockBtn(btn);alert('Connection error.');}}

function toggleDept(id){
  const el=document.getElementById(id);
  if(!el)return;
  const dept=id.replace('dept-','');
  const arr=document.getElementById('arr-'+dept);
  const isOpen=el.style.display!=='none';
  // Close all dept accordions
  document.querySelectorAll('[id^="dept-"]').forEach(d=>{d.style.display='none';});
  document.querySelectorAll('[id^="arr-"]').forEach(a=>{a.textContent='▸';});
  if(!isOpen){
    el.style.display='block';
    if(arr)arr.textContent='▾';
  }
}

async function doneTkt(id){const btn=event.target;if(btn&&btn.disabled)return;lockBtn(btn,'Saving...');try{await post({action:'doneTicket',ticketId:id});alert('Ticket done!');loadView('home');}catch(e){unlockBtn(btn);alert('Connection error.');}}
</script>
