<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CT Equipment System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F2F5;
  --surface:#FFFFFF;
  --surface2:#F8F9FB;
  --border:#E4E7ED;
  --border2:#CBD0DA;
  --text1:#0F172A;
  --text2:#475569;
  --text3:#94A3B8;
  --blue:#2563EB;
  --blue-bg:#EFF6FF;
  --blue-border:#BFDBFE;
  --blue-dark:#1D4ED8;
  --green:#059669;
  --green-bg:#ECFDF5;
  --green-border:#A7F3D0;
  --amber:#B45309;
  --amber-bg:#FFFBEB;
  --amber-border:#FDE68A;
  --red:#DC2626;
  --red-bg:#FEF2F2;
  --red-border:#FECACA;
  --teal:#0891B2;
  --teal-bg:#ECFEFF;
  --teal-border:#A5F3FC;
  --purple:#7C3AED;
  --purple-bg:#F5F3FF;
  --purple-border:#DDD6FE;
  --r:10px;--r2:8px;--r3:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text1);overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#login-screen{align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-wrap{width:100%;max-width:380px}
.login-header{text-align:center;margin-bottom:32px}
.login-icon{width:56px;height:56px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
.login-title{font-size:22px;font-weight:700;color:var(--text1);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fl{margin-bottom:16px}
.fl-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:block}
.fl-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;font-size:14px;color:var(--text1);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.fl-input:focus{border-color:var(--blue);background:var(--surface)}
.fl-input::placeholder{color:var(--text3)}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-login:hover{background:var(--blue-dark)}
.btn-login:active{transform:scale(.99)}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:54px;padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-back{width:34px;height:34px;border-radius:var(--r3);background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);flex-shrink:0;transition:background .1s}
.tb-back:hover{background:var(--border)}
.tb-title{font-size:15px;font-weight:600;color:var(--text1);flex:1}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.tb-badge{font-size:10px;font-weight:600;background:var(--red);color:#fff;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.role-chip{font-size:10px;font-weight:500;padding:3px 9px;border-radius:999px}
.rc-cl{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.rc-am{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.rc-mnt{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.rc-qa{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.rc-fsm{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.rc-op{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.rc-tk{background:#F1F5F9;color:var(--text2);border:1px solid var(--border)}

/* CONTENT */
.content{flex:1;padding:14px;overflow-y:auto;background:var(--bg)}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin:0 0 8px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi-grid.cols3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.cols1{grid-template-columns:1fr}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi-card.blue::after{background:var(--blue)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.amber::after{background:var(--amber)}
.kpi-card.red::after{background:var(--red)}
.kpi-card.teal::after{background:var(--teal)}
.kpi-card.purple::after{background:var(--purple)}
.kpi-card:hover,.kpi-card.active{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-label{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.kpi-value{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-value.blue{color:var(--blue)}.kpi-value.green{color:var(--green)}
.kpi-value.amber{color:var(--amber)}.kpi-value.red{color:var(--red)}
.kpi-value.teal{color:var(--teal)}.kpi-value.purple{color:var(--purple)}
.kpi-value small{font-size:14px;font-weight:500;color:var(--text3)}
.kpi-hint{font-size:9px;color:var(--text3)}
.kpi-tap{font-size:9px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:4px}

/* EXPAND PANEL */
.expand-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.expand-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.expand-head-title{font-size:12px;font-weight:600;color:var(--text1)}
.expand-close{font-size:11px;color:var(--text2);cursor:pointer;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:var(--r3)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.card-row{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-row:last-child{border-bottom:none}
.card-row.clickable{cursor:pointer;transition:background .1s}
.card-row.clickable:hover{background:var(--surface2)}
.cr-icon{width:32px;height:32px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cr-body{flex:1;min-width:0}
.cr-title{font-size:13px;font-weight:500;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-sub{font-size:11px;color:var(--text2);margin-top:1px}
.cr-right{flex-shrink:0;display:flex;align-items:center;gap:6px}
.chevron{font-size:12px;color:var(--text3)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600;flex-shrink:0}
.badge.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge.blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge.teal{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.badge.purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.badge.gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* DEPT BADGES */
.dept{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.dept.dwo{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.dept.uc{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.dept.sawcod{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.dept.all{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ALERT BAR */
.alert-bar{border-radius:var(--r2);padding:10px 12px;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;line-height:1.4}
.alert-bar.red{background:var(--red-bg);border:1px solid var(--red-border);color:#991B1B}
.alert-bar.amber{background:var(--amber-bg);border:1px solid var(--amber-border);color:#92400E}
.alert-bar.blue{background:var(--blue-bg);border:1px solid var(--blue-border);color:#1E40AF}
.alert-bar.green{background:var(--green-bg);border:1px solid var(--green-border);color:#065F46}
.alert-icon{font-size:13px;flex-shrink:0;margin-top:1px}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:11px 16px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-bottom:8px;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.99)}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue-dark)}
.btn.danger{background:var(--red);color:#fff}
.btn.success{background:var(--green);color:#fff}
.btn.warning{background:var(--amber);color:#fff}
.btn.ghost{background:var(--surface);color:var(--text1);border:1px solid var(--border2)}
.btn.ghost:hover{background:var(--surface2)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{margin-bottom:0}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;font-size:13px;color:var(--text1);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:var(--surface)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3)}
.form-select{appearance:none;cursor:pointer}
.form-textarea{resize:none}

/* PROGRESS BAR */
.prog-wrap{background:var(--border);border-radius:999px;height:6px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:999px;transition:width .4s}

/* STAT ROW */
.stat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-name{font-size:12px;color:var(--text1);flex:1}
.stat-val{font-size:12px;font-weight:600;color:var(--text1)}
.stat-sub{font-size:10px;color:var(--text2)}

/* TABLE */
.tbl{width:100%;font-size:11px;border-collapse:collapse}
.tbl th{text-align:left;color:var(--text3);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 8px;color:var(--text1);border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}

/* MONTH CHART */
.month-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:6px}
.month-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.month-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height .3s}
.month-bar-label{font-size:8px;color:var(--text3);font-weight:500}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 4px;flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;transition:color .15s}
.nav-item.active{color:var(--blue)}
.nav-icon{font-size:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--border)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:16px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:48px 16px;color:var(--text3);font-size:13px;gap:10px;flex-direction:column}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-action{font-size:11px;color:var(--blue);font-weight:500;cursor:pointer}

/* DEPT OVERVIEW CARD */
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.dept-card-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.dept-card-title{font-size:13px;font-weight:600;color:var(--text1);flex:1}
.dept-card-body{padding:0}
.pkg-row{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.pkg-row:last-child{border-bottom:none}
.pkg-row:hover{background:var(--surface2)}
.pkg-id{font-size:12px;font-weight:600;color:var(--text1);min-width:70px;font-family:'JetBrains Mono',monospace}
.pkg-loc{font-size:11px;color:var(--text2);flex:1}
.pkg-util{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:50px}
.pkg-util-val{font-size:12px;font-weight:700}
.pkg-util-bar{width:50px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pkg-util-fill{height:100%;border-radius:2px}

/* TICKET CHART */
.ticket-month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.tm-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:10px;text-align:center;cursor:pointer;transition:border-color .15s}
.tm-card:hover,.tm-card.active{border-color:var(--blue)}
.tm-month{font-size:10px;color:var(--text2);font-weight:500;margin-bottom:4px}
.tm-val{font-size:20px;font-weight:700;color:var(--text1)}
.tm-sub{font-size:9px;color:var(--text3);margin-top:2px}

/* UTILIZATION RING - simple text-based */
.util-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;flex-shrink:0;font-size:13px;font-weight:700;border:3px solid}
.util-ring.high{border-color:var(--green);color:var(--green)}
.util-ring.mid{border-color:var(--amber);color:var(--amber)}
.util-ring.low{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-icon">🛢</div>
      <div class="login-title">CT Equipment System</div>
      <div class="login-sub">Sign in to your dashboard</div>
    </div>
    <div class="login-card">
      <div class="fl">
        <label class="fl-label">Username</label>
        <input type="text" class="fl-input" id="login-u" placeholder="e.g. Mohamed.Baligh" autocomplete="username">
      </div>
      <div class="fl">
        <label class="fl-label">Password</label>
        <input type="password" class="fl-input" id="login-p" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in</button>
      <div class="login-err" id="login-err">Invalid username or password</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="tb-back" id="tb-back" style="display:none" onclick="goBack()">←</div>
    <div class="tb-title" id="tb-title">Dashboard</div>
    <div class="tb-right">
      <span class="role-chip" id="tb-role-chip"></span>
      <div class="tb-avatar" id="tb-avatar">U</div>
    </div>
  </div>
  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
  </div>
  <div class="bottom-nav" id="bottom-nav" style="display:none">
    <div class="nav-item active" id="nav-home" onclick="navTo('home')"><div class="nav-icon">⊞</div>Home</div>
    <div class="nav-item" id="nav-2" onclick="navTo('jobs')"><div class="nav-icon">📋</div>Jobs</div>
    <div class="nav-item" id="nav-3" onclick="navTo('equipment')"><div class="nav-icon">⚙</div>Equipment</div>
    <div class="nav-item" id="nav-4" onclick="navTo('alerts')"><div class="nav-icon">🔔</div>Alerts</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxzUp3TylmC-rMZX4FqC3jcgBtENCkedeyVAfzMbnQZW_SCVTnGEphm9I9zg-ELCOj6/exec';
let USER=null,NAV=[],CACHE={},OPEN_KPI=null;

// ── API ──────────────────────────────────────
async function apiGet(p,force){
  const k=JSON.stringify(p),now=Date.now();
  if(!force&&CACHE[k]&&now-CACHE[k].t<60000)return CACHE[k].d;
  const r=await fetch(API+'?'+new URLSearchParams(p));
  const d=await r.json();
  CACHE[k]={d,t:now};return d;
}
async function apiPost(data){
  Object.keys(CACHE).forEach(k=>delete CACHE[k]);
  const r=await fetch(API,{method:'POST',body:JSON.stringify(data)});
  return r.json();
}
async function preload(){
  const dept=USER.department;
  await Promise.all([
    apiGet({action:'getJobs',department:dept}),
    apiGet({action:'getEquipment',department:dept}),
    apiGet({action:'getPMAlerts',department:dept}),
    apiGet({action:'getMNT'}),
    apiGet({action:'getTickets'}),
    apiGet({action:'getExemptions'}),
    dept==='All'&&apiGet({action:'getPool'}),
    dept==='All'&&apiGet({action:'getDashboard',department:'All'}),
  ].filter(Boolean));
}

// ── AUTH ─────────────────────────────────────
async function doLogin(){
  const btn=document.getElementById('login-btn'),err=document.getElementById('login-err');
  const u=document.getElementById('login-u').value.trim(),p=document.getElementById('login-p').value.trim();
  if(!u||!p)return;
  btn.textContent='Signing in...';btn.disabled=true;err.style.display='none';
  try{
    const res=await apiGet({action:'login',username:u,password:p},true);
    if(res.success){USER=res;showApp();}
    else{err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
  }catch(e){err.textContent='Connection error';err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
}
document.getElementById('login-p').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});

// ── APP INIT ─────────────────────────────────
async function showApp(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const init=USER.fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('tb-avatar').textContent=init;
  const roleMap={'Cell Leader':'rc-cl','Asset Manager':'rc-am','MNT Manager':'rc-mnt','QAQC Manager':'rc-qa','FSM':'rc-fsm','Operation Manager':'rc-op','Ticketing':'rc-tk'};

// ── NAV ──────────────────────────────────────
function navTo(v,p){
  NAV=[{v,p}];
  document.getElementById('tb-back').style.display='none';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const h=document.getElementById('nav-home');if(h)h.classList.add('active');
  loadView(v,p);
}
function pushView(v,p,title){
  NAV.push({v,p,title});
  document.getElementById('tb-back').style.display='flex';
  loadView(v,p,title);
}
function goBack(){
  if(NAV.length>1){
    NAV.pop();const prev=NAV[NAV.length-1];
    if(NAV.length===1)document.getElementById('tb-back').style.display='none';
    loadView(prev.v,prev.p,prev.title);
  }
}
async function loadView(v,p,title){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  if(title)document.getElementById('tb-title').textContent=title;
  OPEN_KPI=null;
  try{
    if(v==='home')await renderHome(c);
    else if(v==='jobs')await renderJobs(c);
    else if(v==='equipment')await renderEquipment(c);
    else if(v==='alerts')await renderAlerts(c);
    else if(v==='mnt')await renderMNTList(c);
    else if(v==='qaqc')await renderQAQCList(c);
    else if(v==='job-detail')await renderJobDetail(c,p);
    else if(v==='create-job')renderCreateJob(c);
    else if(v==='history')await renderTicketHistory(c);
    else c.innerHTML='<div class="empty">View not found</div>';
  }catch(e){c.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

// ── KPI TOGGLE ───────────────────────────────
function toggleKPI(id){
  const el=document.getElementById(id);if(!el)return;
  if(OPEN_KPI&&OPEN_KPI!==id){
    const prev=document.getElementById(OPEN_KPI);
    if(prev)prev.style.display='none';
    document.querySelectorAll('.kpi-card').forEach(k=>k.classList.remove('active'));
  }
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(!isOpen)OPEN_KPI=id;else OPEN_KPI=null;
}

  const notAck=tickets.filter(t=>t.status==='Not Acknowledged');
  const acked=tickets.filter(t=>t.status==='Acknowledged');

  // Monthly stats
  const monthStats={};
  tickets.forEach(t=>{
    if(!t.completionDate)return;
    const m=t.completionDate.slice(0,7);
    if(!monthStats[m])monthStats[m]={total:0,done:0,byDept:{}};
    monthStats[m].total++;
    if(t.status==='Done')monthStats[m].done++;
    const d=t.department||'Unknown';
    if(!monthStats[m].byDept[d])monthStats[m].byDept[d]={total:0,done:0};

    if(t.status==='Done')monthStats[m].byDept[d].done++;

      </div>`).join('')}

  <div id="tk-acked" style="display:none"><div class="expand-box">
    <div class="expand-head"><span class="expand-head-title">In progress</span><span class="expand-close" onclick="toggleKPI('tk-acked')">close</span></div>
    ${acked.length===0?'<div class="empty">No tickets in progress</div>':acked.map(t=>`
      <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600">${t.ticketId}</span><span class="badge blue">Acknowledged</span></div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:8px">${t.jobId} · ${t.wellNumber} · Ack ${t.acknowledgedDate}</div>
        <button class="btn success" style="padding:8px;font-size:12px" onclick="doneTicket('${t.ticketId}')">Mark ticket done ✓</button>
      </div>`).join('')}
  </div></div>

  <div id="tk-done" style="display:none"><div class="expand-box">
    <div class="expand-head"><span class="expand-head-title">Completed tickets</span><span class="expand-close" onclick="toggleKPI('tk-done')">close</span></div>
    ${done.map(t=>`<div class="card-row"><div class="cr-body"><div class="cr-title">${t.ticketId} · ${t.jobId}</div><div class="cr-sub">${t.wellNumber} · Done ${t.ticketDoneDate}</div></div><span class="badge green">Done</span></div>`).join('')}

  <div class="divider"></div>
  <div class="sec-label">Monthly summary</div>
  <div class="card">
    <div style="padding:12px 14px">
      <div style="display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:10px">
        ${months.map(m=>{const pct=Math.round((monthStats[m].total/maxT)*100);const donePct=Math.round((monthStats[m].done/monthStats[m].total)*100);return`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end;cursor:pointer" onclick="toggleMonthDetail('${m}')">
            <div style="font-size:9px;font-weight:600;color:var(--text2)">${monthStats[m].total}</div>
            <div style="width:100%;display:flex;flex-direction:column;height:${pct}%;border-radius:4px 4px 0 0;overflow:hidden;min-height:6px">
              <div style="flex:${donePct};background:var(--green)"></div>
              <div style="flex:${100-donePct};background:var(--border2)"></div>
            </div>
            <div style="font-size:8px;color:var(--text3)">${m.slice(5)}</div>
          </div>`;}).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)"><div style="width:8px;height:8px;background:var(--green);border-radius:2px"></div>Done</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)"><div style="width:8px;height:8px;background:var(--border2);border-radius:2px"></div>Pending</div>
        <div style="font-size:10px;color:var(--text3)">tap bar = dept breakdown</div>
      </div>
    </div>
    <div id="month-detail" style="display:none;border-top:1px solid var(--border);padding:12px 14px"></div>
  </div>`;

  window.monthStatsGlobal=monthStats;
}

function toggleMonthDetail(m){
  const el=document.getElementById('month-detail');
  const stats=window.monthStatsGlobal||{};
  if(!el||!stats[m])return;
  el.style.display='block';
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:12px;font-weight:600;color:var(--text1)">${m} — ${stats[m].done}/${stats[m].total} done</span>
    </div>
    ${Object.entries(stats[m].byDept).map(([dept,ds])=>`
      <div class="stat-row" style="padding:7px 0">
        <span class="dept ${dept.toLowerCase().replace(/[^a-z]/g,'')}" style="min-width:72px">${dept}</span>
        <div style="flex:1;margin:0 10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:10px;color:var(--text3)">completion</span>
            <span style="font-size:10px;font-weight:600;color:${ds.total>0&&ds.done===ds.total?'var(--green)':'var(--text2)'}">${ds.done}/${ds.total}</span>
          </div>
          <div class="prog-wrap"><div class="prog-fill" style="width:${ds.total>0?Math.round(ds.done/ds.total*100):0}%;background:${ds.total>0&&ds.done===ds.total?'var(--green)':'var(--amber)'}"></div></div>
        </div>
        <span class="badge ${ds.done===ds.total&&ds.total>0?'green':'amber'}">${ds.done===ds.total&&ds.total>0?'✓ Done':'In progress'}</span>
      </div>`).join('')}`;
}

  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}

function openFaultModal(jobId,pkgId){
  openModal(`
    <div class="modal-title">Report fault / swap equipment</div>
    <div class="form-group"><label class="form-label">Equipment with fault</label><input type="text" class="form-input" id="f-old" placeholder="e.g. PU-014"></div>
    <div class="form-group"><label class="form-label">Replacement equipment</label><input type="text" class="form-input" id="f-new" placeholder="e.g. PU-021"></div>
    <div class="form-group"><label class="form-label">Equipment type</label><input type="text" class="form-input" id="f-type" placeholder="e.g. Fluid Pump"></div>
    <div class="form-group"><label class="form-label">Reason</label><textarea class="form-textarea" id="f-reason" rows="3" placeholder="Describe the fault..."></textarea></div>
    <button class="btn danger" onclick="submitFault('${jobId}','${pkgId}')">Submit fault report</button>`);
}
async function submitFault(jobId,pkgId){
  const oldEq=document.getElementById('f-old').value.trim(),newEq=document.getElementById('f-new').value.trim(),type=document.getElementById('f-type').value.trim(),reason=document.getElementById('f-reason').value.trim();
  if(!oldEq||!reason)return alert('Please fill required fields');
  await apiPost({action:'reportFault',jobId,packageId:pkgId,equipmentId:oldEq,equipmentType:type,oldEquipment:oldEq,newEquipment:newEq,department:USER.department,cellLeader:USER.fullName,reason,mntManager:'Tanveer.Hussain'});
  document.getElementById('modal-overlay').classList.remove('open');
  alert('Fault reported. Notifications sent to Asset Manager, FSM & MNT Manager.');
  loadView('home');
}

function openDemobModal(jobId,wellNumber,pkgId,mobDate){
  openModal(`
    <div class="modal-title">Enter demob date</div>
    <div class="form-group"><label class="form-label">Demob date</label><input type="date" class="form-input" id="demob-d" value="${new Date().toISOString().split('T')[0]}"></div>
    <button class="btn primary" onclick="submitDemob('${jobId}','${wellNumber}','${pkgId}','${mobDate}')">Confirm demob — close job</button>`);
}
async function submitDemob(jobId,wellNumber,pkgId,mobDate){
  const d=document.getElementById('demob-d').value;if(!d)return;
  const res=await apiPost({action:'demoJob',jobId,wellNumber,packageId:pkgId,department:USER.department,mobDate,demobDate:d});
  document.getElementById('modal-overlay').classList.remove('open');
  alert(`Job closed. Ticket ${res.ticketId} created for Ticketing Team.`);
  loadView('home');
}

function openExemptionModal(jobId,pkgId){
  openModal(`
    <div class="modal-title">Request exemption</div>
    <div class="form-group"><label class="form-label">Equipment ID</label><input type="text" class="form-input" id="ex-eq" placeholder="e.g. CC-706"></div>
    <div class="form-group"><label class="form-label">Reason</label><textarea class="form-textarea" id="ex-reason" rows="3" placeholder="Why can't this equipment be replaced?"></textarea></div>
    <button class="btn warning" onclick="submitExemption('${jobId}','${pkgId}')">Submit exemption request</button>`);
}
async function submitExemption(jobId,pkgId){
  const eqId=document.getElementById('ex-eq').value.trim(),reason=document.getElementById('ex-reason').value.trim();
  if(!eqId||!reason)return alert('Please fill all fields');
  const res=await apiPost({action:'requestExemption',jobId,packageId:pkgId,equipmentId:eqId,department:USER.department,reason});
  document.getElementById('modal-overlay').classList.remove('open');
  alert(`Exemption ${res.exemptionId} submitted to all 4 approvers.`);
  loadView('home');
}

async function submitCreateJob(){
  const well=document.getElementById('cj-well').value.trim(),rig=document.getElementById('cj-rig').value.trim(),pkg=document.getElementById('cj-pkg').value.trim(),mob=document.getElementById('cj-mob').value;
  if(!well||!rig||!pkg||!mob)return alert('Please fill all fields');
  const res=await apiPost({action:'createJob',wellNumber:well,rigNumber:rig,packageId:pkg,department:USER.department,cellLeader:USER.fullName,mobDate:mob});
  if(res.success){alert(`Job ${res.jobId} created!`);goBack();loadView('home');}
  else alert('Error: '+(res.error||'Unknown'));
}

async function markMNTDone(mntId,eqId){
  await apiPost({action:'markMNTDone',mntId,equipmentId:eqId});
  alert(`${eqId} marked done → sent to QAQC Manager.`);
  loadView('home');
}
async function qaqcDecision(mntId,decision){
  const reason=document.getElementById('qa-reason-'+mntId)?.value||'';
  await apiPost({action:'qaqcDecision',mntId,decision,reason});
  alert(decision==='Approved'?'Approved → moved to Pool':'Rejected → returned to MNT Manager');
  loadView('home');
}
async function acknowledgeTicket(ticketId){
  await apiPost({action:'acknowledgeTicket',ticketId});
  alert('Ticket acknowledged.');
  loadView('home');
}
async function doneTicket(ticketId){
  await apiPost({action:'doneTicket',ticketId});
  alert('Ticket marked as done!');
  loadView('home');
}
</script>
</body>
</html>
