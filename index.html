<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CT Equipment System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060E1C;
  --s1:#0A1628;
  --s2:#0F1E35;
  --s3:#1A2E4A;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --t1:#E2E8F0;
  --t2:#94A3B8;
  --t3:#4A6080;
  --green:#10B981;--green-bg:rgba(16,185,129,.12);--green-b:rgba(16,185,129,.25);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);--red-b:rgba(239,68,68,.25);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);--blue-b:rgba(59,130,246,.25);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.1);--amber-b:rgba(245,158,11,.25);
  --teal:#06B6D4;--teal-bg:rgba(6,182,212,.1);--teal-b:rgba(6,182,212,.25);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,.1);--purple-b:rgba(139,92,246,.25);
  --r:10px;--r2:8px;--r3:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#login-screen{align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-wrap{width:100%;max-width:360px}
.login-logo{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.login-title{font-size:22px;font-weight:700;color:var(--t1);text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:28px}
.login-card{background:var(--s2);border:1px solid var(--border2);border-radius:16px;padding:24px}
.fl-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.fl-input{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 13px;font-size:14px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:border-color .15s}
.fl-input:focus{border-color:var(--blue)}
.fl-input::placeholder{color:var(--t3)}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-login:hover{opacity:.9}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none}

/* TOPBAR */
.topbar{background:var(--s2);border-bottom:1px solid var(--border);height:54px;padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-back{width:34px;height:34px;border-radius:var(--r3);background:var(--s3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--t1);flex:1}
.tb-av{width:34px;height:34px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.role-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px}
.rc-cl{background:var(--blue-bg);color:#60A5FA;border:1px solid var(--blue-b)}
.rc-am{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.rc-mnt{background:var(--red-bg);color:#FCA5A5;border:1px solid var(--red-b)}
.rc-qa{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.rc-fsm{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.rc-op{background:var(--teal-bg);color:#67E8F9;border:1px solid var(--teal-b)}
.rc-tk{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* CONTENT */
.content{flex:1;padding:14px;overflow-y:auto;background:var(--bg);padding-bottom:72px;}
.slbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi-row.c3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.b::before{background:var(--blue)}
.kpi.a::before{background:var(--amber)}.kpi.r::before{background:var(--red)}
.kpi.t::before{background:var(--teal)}.kpi.p::before{background:var(--purple)}
.kpi:hover,.kpi.open{border-color:var(--border2)}
.kpi-lbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.kpi-tap{font-size:8px;background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--t3)}
.kpi-val{font-size:26px;font-weight:700;color:var(--t1);line-height:1;margin-bottom:3px}
.kpi-val.g{color:var(--green)}.kpi-val.b{color:var(--blue)}
.kpi-val.a{color:var(--amber)}.kpi-val.r{color:var(--red)}
.kpi-val.t{color:var(--teal)}.kpi-val.p{color:var(--purple)}
.kpi-val small{font-size:13px;font-weight:400;color:var(--t3)}
.kpi-sub{font-size:9px;color:var(--t3)}

/* EXPAND */
.expand{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.exp-head{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.exp-title{font-size:11px;font-weight:600;color:var(--t2)}
.exp-close{font-size:10px;color:var(--t3);cursor:pointer;background:var(--s3);border:1px solid var(--border2);padding:2px 8px;border-radius:4px}

/* CARD */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.card-head{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;color:var(--t2)}
.card-body{padding:12px 13px}
.crow{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--s3)}
.crow.nc{cursor:default}.crow.nc:hover{background:transparent}
.ci{width:30px;height:30px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cb{flex:1;min-width:0}
.ct2{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:10px;color:var(--t2);margin-top:2px}
.cr{flex-shrink:0;display:flex;align-items:center;gap:6px}
.chev{font-size:11px;color:var(--t3)}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:600;flex-shrink:0}
.bdg.g{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.bdg.b{background:var(--blue-bg);color:#93C5FD;border:1px solid var(--blue-b)}
.bdg.a{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.bdg.r{background:var(--red-bg);color:#FCA5A5;border:1px solid var(--red-b)}
.bdg.t{background:var(--teal-bg);color:#67E8F9;border:1px solid var(--teal-b)}
.bdg.p{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.bdg.gray{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* DEPT PILL */
.dp{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:600}
.dp.dwo{background:var(--purple-bg);color:#C4B5FD;border:1px solid var(--purple-b)}
.dp.uc{background:var(--green-bg);color:#6EE7B7;border:1px solid var(--green-b)}
.dp.saw{background:var(--amber-bg);color:#FCD34D;border:1px solid var(--amber-b)}
.dp.all{background:var(--s3);color:var(--t2);border:1px solid var(--border2)}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.leg{display:flex;align-items:center;gap:7px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:10px;color:var(--t2);flex:1}
.leg-val{font-size:11px;font-weight:600;color:var(--t1)}
.leg-pct{font-size:9px;color:var(--t3);min-width:28px;text-align:right}
.leg-row{display:flex;gap:8px;flex-wrap:wrap}
.leg-h{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3)}
.leg-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* UTIL BAR */
.urow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.urow:last-child{margin-bottom:0}
.upkg{font-size:10px;font-weight:600;color:var(--t2);min-width:64px;font-family:'JetBrains Mono',monospace,sans-serif}
.ubar{flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;display:flex}
.useg{height:100%}
.upct{font-size:10px;font-weight:700;color:var(--t1);min-width:32px;text-align:right}

/* PROG BAR */
.prow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prow:last-child{margin-bottom:0}
.pname{font-size:10px;color:var(--t2);min-width:80px}
.pbar{flex:1;height:7px;background:var(--s3);border-radius:999px;overflow:hidden}
.pfill{height:100%;border-radius:999px}
.ppct{font-size:10px;font-weight:700;min-width:36px;text-align:right}

/* DEPT OVERVIEW */
.drow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.dinfo{flex:1}
.dcnt{font-size:12px;font-weight:600;color:var(--t1)}
.dsub{font-size:9px;color:var(--t3);margin-top:1px}
.dutil{text-align:right}
.dutil-val{font-size:13px;font-weight:700;color:var(--green)}
.dutil-sub{font-size:9px;color:var(--t3)}

/* PKG ROW */
.pkrow{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.pkrow:last-child{border-bottom:none}
.pkrow:hover{background:var(--s3)}
.pkid{font-size:11px;font-weight:600;color:var(--t1);min-width:66px;font-family:'JetBrains Mono',monospace,sans-serif}
.pkloc{flex:1}
.pkloc-main{font-size:11px;color:var(--t1)}
.pkloc-sub{font-size:9px;color:var(--t3);margin-top:1px}

/* ALERT */
.alert{border-radius:var(--r2);padding:9px 11px;font-size:10px;display:flex;gap:7px;margin-bottom:6px;line-height:1.5}
.alert.r{background:var(--red-bg);border:1px solid var(--red-b);color:#FCA5A5}
.alert.a{background:var(--amber-bg);border:1px solid var(--amber-b);color:#FCD34D}
.alert.b{background:var(--blue-bg);border:1px solid var(--blue-b);color:#93C5FD}
.alert.g{background:var(--green-bg);border:1px solid var(--green-b);color:#6EE7B7}
.alert-icon{flex-shrink:0}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:11px 16px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:last-child{margin-bottom:0}
.btn:active{opacity:.85}
.btn.primary{background:var(--blue);color:#fff}
.btn.danger{background:var(--red);color:#fff}
.btn.success{background:var(--green);color:#fff}
.btn.warning{background:var(--amber);color:#0A1628}
.btn.ghost{background:var(--s3);color:var(--t1);border:1px solid var(--border2)}
.btn-row{display:flex;gap:8px;width:100%}.btn-row .btn{margin-bottom:0;flex:1}

/* FORM */
.fg{margin-bottom:13px}
.flbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:block}
.finput,.fselect,.ftextarea{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 12px;font-size:13px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.finput:focus,.ftextarea:focus{border-color:var(--blue)}
.finput::placeholder,.ftextarea::placeholder{color:var(--t3)}
.ftextarea{resize:none}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* BOTTOM NAV */
.bottom-nav{background:var(--s2);border-top:1px solid var(--border);display:flex;padding:6px 0 4px;flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:100;max-width:100%;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:500;transition:color .15s}
.ni.active{color:var(--blue)}
.ni-icon{font-size:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--s2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:16px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 16px;color:var(--t3);font-size:13px;gap:10px;flex-direction:column}
.spinner{width:24px;height:24px;border:2.5px solid var(--s3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 16px;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">🛢</div>
    <div class="login-title">CT Equipment System</div>
    <div class="login-sub">Sign in to access your dashboard</div>
    <div class="login-card">
      <label class="fl-label">Username</label>
      <input type="text" class="fl-input" id="lu" placeholder="Mohamed.Baligh" autocomplete="username">
      <label class="fl-label">Password</label>
      <input type="password" class="fl-input" id="lp" placeholder="••••••••" autocomplete="current-password" style="margin-bottom:0">
      <button class="btn-login" id="lbtn" onclick="doLogin()">Sign in</button>
      <div class="login-err" id="lerr">Invalid username or password</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="tb-back" id="tb-back" style="display:none" onclick="goBack()" style="cursor:pointer">←</div>
    <div class="tb-title" id="tb-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="role-chip" id="tb-chip"></span>
      <div class="tb-av" id="tb-av" onclick="USER&&USER._isAdmin?openAdminSwitcher():navTo('home')" style="cursor:pointer">U</div>
    </div>
  </div>
  <div class="content" id="mc">
    <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
  </div>
  <div class="bottom-nav" id="bnav" style="display:none">
    <div class="ni active" id="n1" onclick="navTo('home')"><div class="ni-icon">⊞</div>Home</div>
    <div class="ni" id="n2" onclick="navTo('jobs')"><div class="ni-icon">📋</div>Jobs</div>
    <div class="ni" id="n3" onclick="navTo('equipment')"><div class="ni-icon">⚙</div>Equipment</div>
    <div class="ni" id="n4" onclick="navTo('alerts')"><div class="ni-icon">🔔</div>Alerts</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="movl" onclick="closeMod(event)">
  <div class="modal" id="mbody"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxzUp3TylmC-rMZX4FqC3jcgBtENCkedeyVAfzMbnQZW_SCVTnGEphm9I9zg-ELCOj6/exec';
let USER=null,NAV=[],CACHE={},OKPI=null;
function lockBtn(btn,msg){if(!btn)return;btn.disabled=true;btn._origText=btn.textContent;btn.textContent=msg||'Processing...';btn.style.opacity='0.6';}
function unlockBtn(btn){if(!btn)return;btn.disabled=false;btn.textContent=btn._origText||btn.textContent;btn.style.opacity='';}

function openMod(html){
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('movl').classList.add('open');
}
function closeMod(e){
  if(e&&e.target!==document.getElementById('movl'))return;
  document.getElementById('movl').classList.remove('open');
  document.getElementById('mbody').innerHTML='';
}

// --- API -----------------------------------
async function get(p,force){
  const k=JSON.stringify(p),now=Date.now();
  if(!force&&CACHE[k]&&now-CACHE[k].t<60000)return CACHE[k].d;
  const r=await fetch(API+'?'+new URLSearchParams(p));
  const d=await r.json();CACHE[k]={d,t:now};return d;
}
async function post(data){
  Object.keys(CACHE).forEach(k=>delete CACHE[k]);
  const r=await fetch(API,{method:'POST',body:JSON.stringify(data)});
  return r.json();
}
async function preload(){
  const dept=USER.department,role=USER.role;
  await Promise.all([
    get({action:'getJobs',department:dept}),
    get({action:'getEquipment',department:dept}),
    get({action:'getPMAlerts',department:dept}),
    get({action:'getMNT'}),get({action:'getTickets'}),get({action:'getExemptions'}),
    (dept==='All'||role==='Technical Engineer')&&get({action:'getPool'}),
    (dept==='All'||role==='Technical Engineer')&&get({action:'getDashboard',department:'All'}),
  ].filter(Boolean));
}

// --- AUTH ----------------------------------
async function doLogin(){
  const btn=document.getElementById('lbtn'),err=document.getElementById('lerr');
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value.trim();
  if(!u||!p)return;
  btn.textContent='Signing in...';btn.disabled=true;err.style.display='none';
  try{
    const res=await get({action:'login',username:u,password:p},true);
    if(res.success){USER=res;if(res.role==='Admin')USER._isAdmin=true;showApp();}
    else{err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
  }catch(e){err.textContent='Connection error';err.style.display='block';btn.textContent='Sign in';btn.disabled=false;}
}
document.getElementById('lp').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});

// --- APP -----------------------------------
async function showApp(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const init=USER.role==='Admin'?'🔑':USER.fullName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const av=document.getElementById('tb-av');
  av.textContent=init;
  av.style.fontSize=USER._isAdmin?'18px':'12px';
  if(USER._isAdmin)av.onclick=function(){openAdminSwitcher();};
  const rm={'Cell Leader':'rc-cl','Asset Manager':'rc-am','MNT Manager':'rc-mnt','QAQC Manager':'rc-qa','FSM':'rc-fsm','Operation Manager':'rc-op','Ticketing':'rc-tk','Technical Engineer':'rc-op','Admin':'rc-am'};
  const chip=document.getElementById('tb-chip');
  const isActing=USER._isAdmin&&USER.role!=='Admin';
  chip.textContent=USER.role+(isActing?' [A]':'');
  chip.style.background=isActing?'var(--amber)':'';
  chip.style.color=isActing?'#000':'';
  chip.style.cursor='pointer';
  chip.onclick=function(){ if(USER._isAdmin) openAdminSwitcher(); };
  chip.className='role-chip '+(rm[USER.role]||'rc-tk');
  setupNav();
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading your data...</span></div>';
  await preload();loadView('home');
}

function setupNav(){
  const nav=document.getElementById('bnav'),role=USER.role;

  // Standard 4-button nav (Home, Jobs, Equipment, Alerts)
  const std4 = `

// --- NAV -----------------------------------
function navTo(v,p){
  NAV=[{v,p}];
  document.getElementById('tb-back').style.display='none';
  document.getElementById('tb-title').textContent='Dashboard';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const h=document.getElementById('n1');if(h)h.classList.add('active');
  // Restore bottom nav visibility
  document.getElementById('bnav').style.display='flex';
  loadView(v,p);
}
function pushView(v,p,title){
  NAV.push({v,p,title});
  const back=document.getElementById('tb-back');
  back.style.display='flex';
  if(title)document.getElementById('tb-title').textContent=title;
  loadView(v,p,title);
}
function goBack(){
  if(NAV.length>1){
    NAV.pop();
    const prev=NAV[NAV.length-1];
    if(NAV.length===1){
      document.getElementById('tb-back').style.display='none';
      document.getElementById('tb-title').textContent='Dashboard';
    }else{
      document.getElementById('tb-title').textContent=prev.title||'Dashboard';
    }
    loadView(prev.v,prev.p,prev.title);
  }else{
    navTo('home');
  }
}
async function loadView(v,p,title){
  OKPI=null;const c=document.getElementById('mc');
  c.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  if(title)document.getElementById('tb-title').textContent=title;
  // Always keep bottom nav visible
  const bnav=document.getElementById('bnav');
  if(bnav)bnav.style.display='flex';
  try{
    if(v==='home')await renderHome(c);
    else if(v==='jobs')await renderJobs(c);
    else if(v==='equipment')await renderEq(c);
    else if(v==='alerts')await renderAlerts(c);
    else if(v==='mntlist')await renderMNTList(c);
    else if(v==='job-detail')await renderJobDetail(c,p);
    else if(v==='create-job')renderCreateJob(c);
    else if(v==='history')await renderHistory(c);
    else if(v==='edit-request')await renderEditRequest(c,p);
    else c.innerHTML='<div class="empty">Not found</div>';
  }catch(e){c.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

// --- DONUT SVG HELPER ----------------------
function donut(data,total,cx,cy,r,sw){
  // data = [{val,color}]
  const circ=2*Math.PI*r;
  let offset=-(circ/4);
  let segs='';
  data.forEach(d=>{
    const dash=(d.val/total)*circ;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${offset}" stroke-linecap="butt"/>`;
    offset-=dash;
  });
  return segs;
}

async function approveFault(crId,btnEl){
  if(btnEl&&btnEl.disabled)return;
  if(btnEl){btnEl.disabled=true;btnEl.textContent='...';}
  try{
    const res=await post({action:'approveChange',crId,role:USER.role,reason:''});
    if(res.success){Object.keys(CACHE).forEach(k=>delete CACHE[k]);loadView('home');}
    else{if(btnEl){btnEl.disabled=false;btnEl.textContent='✓';}alert('Error: '+(res.error||'?'));}
  }catch(e){if(btnEl){btnEl.disabled=false;btnEl.textContent='✓';}alert('Error');}
}
function rejectFault(crId,btnEl){
  openRejModal('Reject fault report',async(reason)=>{
    if(btnEl){btnEl.disabled=true;btnEl.textContent='...';}
    try{

      if(res.success){Object.keys(CACHE).forEach(k=>delete CACHE[k]);loadView('home');}
      else alert('Error: '+(res.error||'?'));
    }catch(e){alert('Error');}
  });
}

      get({action:'getExemptions'})

  const reqs=(reqR&&reqR.requests)||[];
  const pendingFSM=reqs.filter(r=>r.status==='Pending FSM'&&r.department===USER.department);

  const mStats={};

    mStats[m].total++;
    if(t.status==='Done')mStats[m].done++;
  });
  const months=Object.keys(mStats).sort().slice(-4);
  const maxT=Math.max(...months.map(m=>mStats[m].total),1);
  // Running jobs deduped
  const seenFSM={};
  const runningFSM=jobs.filter(j=>{
    if(j.status!=='Running'&&j.status!=='Exemption')return false;

    seenFSM[j.jobId]=true;return true;
  });
  const _pmRaw=(pmR.alerts||[]).filter(a=>a.daysLeft<=30);const _pmSeen=new Set();const pm=_pmRaw.filter(a=>{const k=a.equipmentId+a.pmType;if(_pmSeen.has(k))return false;_pmSeen.add(k);return true;});
  // Package utilization
  // Deduplicate jobs by jobId
  const seenJobs={};
  const uniqueJobs=jobs.filter(j=>{if(seenJobs[j.jobId])return false;seenJobs[j.jobId]=true;return true;});

      pkgUtil[j.packageId].total++;
      if(e.status==='Running'||e.status==='Exemption')pkgUtil[j.packageId].onJob++;
      else if(e.status==='Under MNT')pkgUtil[j.packageId].mnt++;
      else pkgUtil[j.packageId].pool++;
    });
  });
  const runningUnique=uniqueJobs.filter(j=>j.status==='Running'||j.status==='Exemption');
  c.innerHTML=`
  <div class="kpi-row">
    <div class="kpi g" onclick="toggleKPI('fsm-run')"><div class="kpi-lbl">Jobs running <span class="kpi-tap">tap ▸</span></div><div class="kpi-val g">${running.length}</div><div class="kpi-sub">${USER.department}</div></div>
    <div class="kpi b" onclick="toggleKPI('fsm-done')"><div class="kpi-lbl">Completed <span class="kpi-tap">tap ▸</span></div><div class="kpi-val b">${done.length}</div><div class="kpi-sub">this year</div></div>
    <div class="kpi a" onclick="toggleKPI('fsm-pending')" style="grid-column:1/-1"><div class="kpi-lbl">Pending FSM approval <span class="kpi-tap">tap ▸</span></div><div class="kpi-val a">${pendingFSM.length}</div><div class="kpi-sub">job requests waiting for you</div></div>
  ${mkFaultKpi((crR.changeRequests||[]).filter(r=>r.amDecision==='Approved'&&(!r.fsmDecision||r.fsmDecision==='Pending')&&r.department===USER.department))}
  ${mkExKpi((exR.exemptions||[]).filter(e=>(!e.fsmDecision||e.fsmDecision==='Pending')&&e.department===USER.department),'fsmDecision',true,'📋 Exemptions pending')}
  ${mkExKpi((exR.exemptions||[]).filter(e=>e.department===USER.department),'fsmDecision',false,'📋 All exemptions')}
  </div>
  <div id="fsm-pending" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Job requests — pending your approval</span><span class="exp-close" onclick="toggleKPI('fsm-pending')">close</span></div>
    ${pendingFSM.length===0?'<div class="empty">No pending requests</div>':pendingFSM.map(r=>`
      <div style="padding:12px 13px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">

        <div style="font-size:10px;color:var(--t2);margin-bottom:6px">Equipment: ${(r.equipmentList||[]).join(', ')}</div>
        <textarea class="ftextarea" id="fsm-note-${r.requestId}" rows="1" placeholder="Notes (optional)..." style="margin-bottom:8px"></textarea>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn success" style="flex:1;padding:11px;font-size:13px;margin-bottom:0" onclick="approveReq('${r.requestId}','FSM',document.getElementById('fsm-note-${r.requestId}').value,this)">✓ Approve</button>

  ${runningFSM.length>0?`

    <div class="leg-row" style="margin-bottom:10px">
      <div class="leg-h"><div class="leg-sq" style="background:var(--green)"></div>On Job</div>
      <div class="leg-h"><div class="leg-sq" style="background:var(--red)"></div>MNT</div>
      <div class="leg-h"><div class="leg-sq" style="background:var(--blue)"></div>Pool</div>
    </div>
    ${[...new Map(running.map(j=>[j.packageId,j])).values()].map(j=>{const u=pkgUtil[j.packageId]||{onJob:0,mnt:0,pool:0,total:1};const t=u.total||1;const op=Math.round(u.onJob/t*100),mp=Math.round(u.mnt/t*100),pp=Math.round(u.pool/t*100);return`

  <div id="fsm-run" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Running jobs</span><span class="exp-close" onclick="toggleKPI('fsm-run')">close</span></div>

async function renderTK(c){
  let res={tickets:[]};
  try{ res=await get({action:'getTickets'}); }catch(e){ console.error('TK fetch error',e); }
  const tickets=res.tickets||[];
  const notAck=tickets.filter(t=>t.status==='Not Acknowledged');
  const acked=tickets.filter(t=>t.status==='Acknowledged');
  const done=tickets.filter(t=>t.status==='Done');
  // Monthly stats
  const mStats={};
  tickets.forEach(t=>{
    if(!t.completionDate)return;
    const m=t.completionDate.slice(0,7);
    if(!mStats[m])mStats[m]={total:0,done:0,amount:0,byDept:{}};
    mStats[m].total++;if(t.status==='Done'){mStats[m].done++;mStats[m].amount+=(t.amount||0);}
    const d=t.department||'Other';
    if(!mStats[m].byDept[d])mStats[m].byDept[d]={total:0,done:0,amount:0};
    mStats[m].byDept[d].total++;if(t.status==='Done'){mStats[m].byDept[d].done++;mStats[m].byDept[d].amount+=(t.amount||0);}
  });
  const months=Object.keys(mStats).sort().slice(-6);
  const maxT=Math.max(...months.map(m=>mStats[m].total),1);
  const total=tickets.length||1;
  c.innerHTML=`
  <div class="kpi-row c3">
    <div class="kpi r" onclick="toggleKPI('tk-na')"><div class="kpi-lbl">Not ack'd</div><div class="kpi-val r">${notAck.length}</div><div class="kpi-sub">tap ▸</div></div>
    <div class="kpi b" onclick="toggleKPI('tk-ac')"><div class="kpi-lbl">In progress</div><div class="kpi-val b">${acked.length}</div><div class="kpi-sub">tap ▸</div></div>
    <div class="kpi g" onclick="toggleKPI('tk-dn')"><div class="kpi-lbl">Done</div><div class="kpi-val g">${done.length}</div><div class="kpi-sub">tap ▸</div></div>

  <!-- Status donut -->

  <div class="card"><div class="card-body">
    <div class="donut-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0">
        <circle cx="50" cy="50" r="38" fill="none" stroke="var(--s3)" stroke-width="14"/>
        ${donut([{val:notAck.length,color:'var(--red)'},{val:acked.length,color:'var(--blue)'},{val:done.length,color:'var(--green)'}],total,50,50,38,14)}
        <text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="var(--t1)">${total}</text>
        <text x="50" y="58" text-anchor="middle" font-size="8" fill="var(--t3)">total</text>
      </svg>
      <div class="donut-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--red)"></div><div class="leg-lbl">Not acknowledged</div><div class="leg-val">${notAck.length}</div></div>
        <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div><div class="leg-lbl">In progress</div><div class="leg-val">${acked.length}</div></div>
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div><div class="leg-lbl">Done</div><div class="leg-val">${done.length}</div></div>
      </div>
    </div>
  </div></div>
  <div id="tk-na" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Not acknowledged</span><span class="exp-close" onclick="toggleKPI('tk-na')">close</span></div>
    ${notAck.length===0?'<div class="empty">All acknowledged ✓</div>':notAck.map(t=>`
      <div style="padding:10px 13px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:600;color:var(--t1)">${t.ticketId}</span><span class="bdg r">Pending</span></div>
        <div style="font-size:10px;color:var(--t2);margin-bottom:8px">${t.jobId} · ${t.wellNumber} · ${t.packageId}<br>Completed ${t.completionDate}</div>
        <button class="btn primary" style="padding:8px;font-size:12px" onclick="ackTkt('${t.ticketId}')">Acknowledge — start ticket</button>
      </div>`).join('')}
  </div></div>
  <div id="tk-ac" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">In progress</span><span class="exp-close" onclick="toggleKPI('tk-ac')">close</span></div>
    ${acked.length===0?'<div class="empty">No tickets in progress</div>':acked.map(t=>`
      <div style="padding:10px 13px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:600;color:var(--t1)">${t.ticketId}</span><span class="bdg b">In Progress</span></div>
        <div style="font-size:10px;color:var(--t2);margin-bottom:8px">${t.jobId} · ${t.wellNumber} · Ack ${t.acknowledgedDate}</div>
        <button class="btn success" style="padding:8px;font-size:12px" onclick="openDoneTicketModal('${t.ticketId}','${t.jobId}','${t.wellNumber}','${t.packageId}')">Mark ticket done ✓</button>
      </div>`).join('')}
  </div></div>
  <div id="tk-dn" style="display:none"><div class="expand">
    <div class="exp-head"><span class="exp-title">Completed tickets</span><span class="exp-close" onclick="toggleKPI('tk-dn')">close</span></div>
    ${done.map(t=>`<div class="crow nc"><div class="cb"><div class="ct2">${t.ticketId} · ${t.jobId}</div><div class="cs">${t.wellNumber} · Done ${t.ticketDoneDate}</div></div><div class="cr"><span style="font-size:11px;font-weight:700;color:var(--green)">${t.amount?'SAR '+t.amount.toLocaleString():'-'}</span><span class="bdg g" style="margin-left:4px">Done</span></div></div>`).join('')}
    ${done.length===0?'<div class="empty">No completed tickets</div>':''}

  <!-- Monthly chart -->

  <div class="card"><div class="card-body">
    <div style="display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:10px">
      ${months.map(m=>{const pct=Math.round(mStats[m].total/maxT*100),dp=mStats[m].total>0?Math.round(mStats[m].done/mStats[m].total*100):0;return`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end;cursor:pointer" onclick="showMonthDetail('${m}')">
          <div style="font-size:9px;font-weight:600;color:var(--t2)">${mStats[m].total}</div>
          <div style="width:100%;border-radius:3px 3px 0 0;overflow:hidden;height:${Math.max(pct,8)}%;display:flex;flex-direction:column">
            <div style="flex:${dp};background:var(--green)"></div>
            <div style="flex:${100-dp};background:var(--s3)"></div>
          </div>
          <div style="font-size:8px;color:var(--t3)">${m.slice(5)}</div>
        </div>`;}).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-bottom:4px">
      <div class="leg-h"><div class="leg-sq" style="background:var(--green)"></div>Done</div>
      <div class="leg-h"><div class="leg-sq" style="background:var(--s3)"></div>Pending</div>
      <div style="font-size:9px;color:var(--t3)">tap bar = dept breakdown</div>
    </div>
    <div id="mdetail" style="display:none;border-top:1px solid var(--border);padding-top:10px;margin-top:6px"></div>
  </div></div>`;
  window._mStats=mStats;
}

function showMonthDetail(m){
  const el=document.getElementById('mdetail'),s=window._mStats||{};
  if(!el||!s[m])return;
  el.style.display='block';
  var _mh='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--t1)">'+m+'</span><span style="font-size:11px;color:var(--green)">SAR '+(s[m].amount||0).toLocaleString()+'</span></div><div style="font-size:10px;color:var(--t2);margin-bottom:8px">'+s[m].done+'/'+s[m].total+' done</div>';
  Object.entries(s[m].byDept).forEach(function(e){var dept=e[0],ds=e[1],pct=ds.total>0?Math.round(ds.done/ds.total*100):0,bg=ds.done===ds.total&&ds.total>0?'var(--green)':'var(--amber)',dc=dept==='D&WO'?'dwo':dept==='UC'?'uc':'saw';_mh+='<div class="prow" style="margin-bottom:8px"><div class="pname"><span class="dp '+dc+'">'+dept+'</span></div><div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+bg+'"></div></div><div class="ppct" style="color:var(--t2)">'+ds.done+'/'+ds.total+'</div></div>'+(ds.amount>0?'<div style="font-size:10px;color:var(--green);margin-top:-4px;margin-bottom:6px;padding-left:4px">SAR '+ds.amount.toLocaleString()+'</div>':'');});
  el.innerHTML=_mh;
}

async function renderEq(c){
  document.getElementById('tb-title').textContent = USER.role==='Asset Manager'||USER.role==='Admin' ? 'Pool Management' : 'Equipment';

  if(USER.role === 'Asset Manager' || USER.role === 'Admin'){
    c.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading equipment...</span></div>';

    // Fetch all data in parallel
    let eqRes={equipment:[]}, jRes={jobs:[]}, mntRes={records:[]};
    try{
      [eqRes, jRes, mntRes] = await Promise.all([
        get({action:'getEquipment', department:'All'}, true),
        get({action:'getJobs', department:'All'}, true),
        get({action:'getMNT'}, true)
      ]);
    }catch(e){ console.error('AM eq fetch error',e); }

    const eq = (eqRes.equipment||[]);
    const runningJobs = (jRes.jobs||[]).filter(j=>j.status==='Running'||j.status==='Exemption');
    const mntRecs = (mntRes.records||[]);
    const pkgs = [];

    // Build package → equipment map
    const pkgEqMap = {};
    pkgs.forEach(p=>{
      (p.equipment||[]).forEach(e=>{ pkgEqMap[e.equipmentId]=true; });
    });

    // Equipment on running jobs — from Package_Details cross-reference
    const onJobEqIds = new Set();
    runningJobs.forEach(j=>{
      // equipmentList from job record
      if(j.equipmentList && j.equipmentList.length){
        j.equipmentList.forEach(id=>onJobEqIds.add(id));
      } else {
        // Fallback: find package and add its equipment
        const pkgId = j.packageId ? j.packageId.replace('CTU-','PKG-') : '';
        const pkg = pkgs.find(p=>p.pkgId===pkgId||p.ctuNumber===j.packageId);
        if(pkg) (pkg.equipment||[]).forEach(e=>onJobEqIds.add(e.equipmentId));
      }
    });

    // MNT equipment
    const mntEqIds = new Set(
      mntRecs.filter(m=>m.status==='Under MNT').map(m=>m.equipmentId)
    );

    // Real status — priority: MNT > On Job > Sheet status
    const getStatus = e => {
      if(mntEqIds.has(e.id)) return 'Under MNT';
      if(onJobEqIds.has(e.id)) return 'On Job';
      if(e.status==='Reserved') return 'On Job';
      if(e.status==='On Job') return 'On Job';
      if(e.status==='Active') return 'Active';
      return 'Standby';
    };

    const inPool = eq.filter(e=>getStatus(e)==='Active').length;
    const onJobCount = eq.filter(e=>getStatus(e)==='On Job').length;
    const inMnt = eq.filter(e=>getStatus(e)==='Under MNT').length;

    const poolList = eq.filter(e=>getStatus(e)==='Active');
    const jobList = eq.filter(e=>getStatus(e)==='On Job');
    const mntList = eq.filter(e=>getStatus(e)==='Under MNT');

    const byType = {};
    eq.forEach(e=>{ if(!byType[e.type]) byType[e.type]=[]; byType[e.type].push(e); });
    const typeOrder = ['Control Cabin','Power Pack','Injector','Gooseneck','Stripper','Work Reel','BOP','Fluid Pump','Nitrogen Pump','C-Pump','Batch Mixer','Frac Tank','Skid Tank','Acid Transporter','Trailer Mounted','N2 Pump','Tool Box'];
    const sortedTypes = Object.keys(byType).sort((a,b)=>{
      const ai=typeOrder.indexOf(a),bi=typeOrder.indexOf(b);
      return (ai<0?99:ai)-(bi<0?99:bi);
    });

    const statusColor = (e) => {
      const s = getStatus(e);
      return s==='Active'?'g': s==='On Job'?'b': s==='Under MNT'?'a': s==='Transferred'?'t':'gray';
    };

    c.innerHTML=`
    <div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi g" onclick="toggleKPI('am-pool-list')" style="cursor:pointer">
        <div class="kpi-lbl">In Pool <span class="kpi-tap">tap ▸</span></div>
        <div class="kpi-val g">${inPool}</div>
        <div class="kpi-sub">available</div>
      </div>
      <div class="kpi b" onclick="toggleKPI('am-job-list')" style="cursor:pointer">
        <div class="kpi-lbl">On Job <span class="kpi-tap">tap ▸</span></div>
        <div class="kpi-val b">${onJobCount}</div>
        <div class="kpi-sub">running jobs</div>
      </div>
      <div class="kpi a" onclick="toggleKPI('am-mnt-list')" style="cursor:pointer">
        <div class="kpi-lbl">Under MNT <span class="kpi-tap">tap ▸</span></div>
        <div class="kpi-val a">${inMnt}</div>
        <div class="kpi-sub">maintenance</div>
      </div>
    </div>

    <div id="am-pool-list" style="display:none"><div class="expand">
      <div class="exp-head"><span class="exp-title">In Pool — ${inPool} units</span><span class="exp-close" onclick="toggleKPI('am-pool-list')">close</span></div>
      ${poolList.map(e=>`<div class="crow nc" style="padding:9px 13px"><div class="cb"><div class="ct2" style="font-family:'JetBrains Mono',monospace">${e.id}</div><div class="cs">${e.type}</div></div><span class="bdg g">Active</span></div>`).join('')}
      ${poolList.length===0?'<div class="empty">No equipment in pool</div>':''}
    </div></div>

    <div id="am-job-list" style="display:none"><div class="expand">
      <div class="exp-head"><span class="exp-title">On Job — ${onJobCount} units</span><span class="exp-close" onclick="toggleKPI('am-job-list')">close</span></div>
      ${jobList.map(e=>`<div class="crow nc" style="padding:9px 13px"><div class="cb"><div class="ct2" style="font-family:'JetBrains Mono',monospace">${e.id}</div><div class="cs">${e.type}</div></div><span class="bdg b">On Job</span></div>`).join('')}
      ${jobList.length===0?'<div class="empty">No equipment on job</div>':''}
    </div></div>

    <div id="am-mnt-list" style="display:none"><div class="expand">
      <div class="exp-head"><span class="exp-title">Under MNT — ${inMnt} units</span><span class="exp-close" onclick="toggleKPI('am-mnt-list')">close</span></div>
      ${mntList.map(e=>`<div class="crow nc" style="padding:9px 13px"><div class="cb"><div class="ct2" style="font-family:'JetBrains Mono',monospace">${e.id}</div><div class="cs">${e.type}</div></div><span class="bdg a">Under MNT</span></div>`).join('')}
      ${mntList.length===0?'<div class="empty">No equipment under MNT</div>':''}
    </div></div>

    <div class="divider"></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      <button class="bdg b" onclick="filterEqType('all')" style="cursor:pointer;padding:5px 12px;font-size:11px">All (${eq.length})</button>
      ${sortedTypes.map(t=>`<button class="bdg gray" onclick="filterEqType('${t}')" style="cursor:pointer;padding:5px 10px;font-size:10px">${t} (${byType[t].length})</button>`).join('')}
    </div>
    <div id="eq-list">
      ${sortedTypes.map(type=>`
        <div class="eq-type-group" data-type="${type}">
          <div class="slbl">${type}</div>
          ${byType[type].map(e=>{
            const st=getStatus(e);
            const sc=st==='Active'?'g':st==='On Job'?'b':st==='Under MNT'?'a':'gray';
            return `<div class="crow" style="padding:10px 13px;cursor:pointer" id="eqrow-${e.id}" onclick="openEqDetails('${e.id}','${e.type}','${e.serial||''}')">
              <div class="cb" style="flex:1">
                <div class="ct2" style="font-family:'JetBrains Mono',monospace">${e.id}</div>
                <div class="cs">${e.type} · ${e.serial||'—'}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span class="bdg ${sc}" id="eqbdg-${e.id}">${st}</span>
                ${st==='Active'?`
                  <button onclick="removeFromPool('${e.id}',this)" style="background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;font-weight:600">Remove</button>
                  <button onclick="openTransfer('${e.id}')" style="background:var(--teal);color:#fff;border:none;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;font-weight:600">Transfer</button>`:
                  st==='Standby'?`

                  st==='Transferred'?`
                  <button onclick="returnToPool('${e.id}',this)" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;font-weight:600">↩ Return to Pool</button>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>`;
    return;
  }

  // Other roles — View Only Pool Management (same data, no action buttons)
  let eqRes2={equipment:[]}, jRes2={jobs:[]}, mntRes2={records:[]};
  try{
    [eqRes2, jRes2, mntRes2] = await Promise.all([
      get({action:'getEquipment', department:'All'}, true),
      get({action:'getJobs', department:'All'}, true),
      get({action:'getMNT'}, true)

  }catch(e){ console.error('Eq view fetch error',e); }

  const eq2 = (eqRes2.equipment||[]);

  runningJobs2.forEach(j=>(j.equipmentList||[]).forEach(id=>onJobIds2.add(id)));
  const mntIds2 = new Set(mntRecs2.filter(m=>m.status==='Under MNT').map(m=>m.equipmentId));

  const getStatus2 = e => {
    if(mntIds2.has(e.id)) return 'Under MNT';
    if(onJobIds2.has(e.id)||e.status==='Reserved'||e.status==='On Job') return 'On Job';
    return e.status==='Active'?'Active':'Standby';
  };

  const inPool2 = eq2.filter(e=>getStatus2(e)==='Active').length;
  const onJob2 = eq2.filter(e=>getStatus2(e)==='On Job').length;
  const inMnt2 = eq2.filter(e=>getStatus2(e)==='Under MNT').length;

  const typeOrder2 = ['Control Cabin','Power Pack','Injector','Gooseneck','Stripper','Work Reel','BOP','Fluid Pump','Nitrogen Pump','C-Pump','Batch Mixer','Frac Tank','Skid Tank','Acid Transporter','Trailer Mounted','N2 Pump','Tool Box'];
  const byType2 = {};
  eq2.forEach(e=>{ if(!byType2[e.type]) byType2[e.type]=[]; byType2[e.type].push(e); });
  const sortedTypes2 = Object.keys(byType2).sort((a,b)=>{
    const ai=typeOrder2.indexOf(a), bi=typeOrder2.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });

  c.innerHTML=`
  <div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi g"><div class="kpi-lbl">In Pool</div><div class="kpi-val g">${inPool2}</div><div class="kpi-sub">available</div></div>
    <div class="kpi b"><div class="kpi-lbl">On Job</div><div class="kpi-val b">${onJob2}</div><div class="kpi-sub">running</div></div>
    <div class="kpi a"><div class="kpi-lbl">Under MNT</div><div class="kpi-val a">${inMnt2}</div><div class="kpi-sub">maintenance</div></div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
    <button class="bdg b" onclick="filterEqType('all')" style="cursor:pointer;padding:5px 12px;font-size:11px">All (${eq2.length})</button>
    ${sortedTypes2.map(t=>`<button class="bdg gray" onclick="filterEqType('${t}')" style="cursor:pointer;padding:5px 10px;font-size:10px">${t} (${byType2[t].length})</button>`).join('')}
  </div>
  <div id="eq-list">
    ${sortedTypes2.map(type=>`
      <div class="eq-type-group" data-type="${type}">
        <div class="slbl">${type}</div>
        ${byType2[type].map(e=>{
          const st2=getStatus2(e);
          const sc2=st2==='Active'?'g':st2==='On Job'?'b':st2==='Under MNT'?'a':'gray';
          return `<div class="crow nc" style="padding:10px 13px;cursor:pointer" onclick="openEqDetails('${e.id}','${e.type}','${e.serial||''}')">
            <div class="cb" style="flex:1">
              <div class="ct2" style="font-family:'JetBrains Mono',monospace">${e.id}</div>
              <div class="cs">${e.type} · ${e.serial||'—'}</div>
            </div>
            <span class="bdg ${sc2}">${st2}</span>
          </div>`;
        }).join('')}
      </div>`).join('')}
  </div>`;
}

function filterEqType(type){
  document.querySelectorAll('.eq-type-group').forEach(g=>{
    g.style.display=(type==='all'||g.dataset.type===type)?'block':'none';
  });
}

async function openEqDetails(eqId, eqType, serial){
  // Build modal immediately with loading state
  const existing = document.getElementById('eq-details-modal');
  if(existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'eq-details-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:flex-end;justify-content:center;padding:0';
  modal.innerHTML = `
    <div style="background:var(--s1);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;border:1px solid var(--border2);border-bottom:none">
      <div style="position:sticky;top:0;background:var(--s1);padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1">
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--t1);font-family:'JetBrains Mono',monospace">${eqId}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:2px">${eqType}${serial?' · S/N: '+serial:''}</div>
        </div>
        <button onclick="document.getElementById('eq-details-modal').remove()"
          style="background:var(--s3);border:none;color:var(--t2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">✕ Close</button>
      </div>
      <div id="eq-details-body" style="padding:16px">
        <div class="loading"><div class="spinner"></div><span>Loading history...</span></div>
      </div>
    </div>`;
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  document.body.appendChild(modal);

  // Fetch history
  try{
    const [histRes, jobsRes] = await Promise.all([
      get({action:'getEquipmentHistory', equipmentId:eqId}, true),
      get({action:'getJobs', department:'All'}, true)
    ]);

    const history = (histRes.history||[]).sort((a,b)=>{
      const da = a.date ? new Date(a.date.split('-').join('/')) : 0;
      const db = b.date ? new Date(b.date.split('-').join('/')) : 0;
      return db - da;
    });
    const jobs = (jobsRes.jobs||[]).filter(j=>(j.equipmentList||[]).includes(eqId));

    // Current status + PM dates from Equipment_Master
    const currentStatus = histRes.currentStatus || (history.length>0 ? history[0].status : 'Unknown');
    const pm2Date = histRes.pm2Date || '';
    const pm3Date = histRes.pm3Date || '';
    const today = new Date();
    function pmDays(dateStr){
      if(!dateStr) return null;
      var d = new Date(dateStr.split('-').join('/'));
      return Math.ceil((d - today)/(1000*60*60*24));
    }
    function pmBadge(dateStr){
      if(!dateStr) return '<span style="color:var(--t3)">—</span>';
      var days = pmDays(dateStr);
      var color = days < 0 ? 'var(--red)' : days <= 7 ? 'var(--red)' : days <= 30 ? 'var(--amber)' : 'var(--green)';
      var label = days < 0 ? 'OVERDUE '+Math.abs(days)+' days' : days+' days left';
      return '<span style="color:'+color+';font-weight:600">'+dateStr+'</span>'
        +' <span style="font-size:10px;color:'+color+'">'+label+'</span>';
    }
    const canEditPM = USER.role==='Cell Leader'||USER.role==='MNT Manager';
    const statusColor = currentStatus==='On Job'?'b':currentStatus==='Pool'?'g':currentStatus==='Under MNT'?'a':currentStatus==='Transferred'?'t':'gray';

    // Calculate utilization
    const now = new Date();
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    const startOfYear  = new Date(now.getFullYear(), 0, 1);

    let daysOnJobMonth = 0, daysOnJobYear = 0, daysOnJobTotal = 0;
    let daysPoolMonth = 0, daysPoolYear = 0;
    let daysMntMonth = 0, daysMntYear = 0;

    // Calculate from history pairs (start → end)
    // Fix timezone: parse date as local not UTC
    const parseDate = d => {
      if(!d) return now;
      const parts = d.split('-');
      return parts.length===3 ? new Date(+parts[0], +parts[1]-1, +parts[2]) : new Date(d);
    };
    for(let i = history.length-1; i >= 0; i--){
      const rec = history[i];
      const recDate = parseDate(rec.date);
      const nextDate = i>0 ? parseDate(history[i-1].date) : now;
      const days = Math.max(0, Math.round((nextDate - recDate)/(1000*60*60*24)));

      const inMonth = recDate < now && nextDate > startOfMonth;
      const inYear  = recDate < now && nextDate > startOfYear;

      if(rec.status === 'On Job'){
        daysOnJobTotal += days;
        if(inYear)  daysOnJobYear  += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfYear))/(1000*60*60*24)));
        if(inMonth) daysOnJobMonth += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfMonth))/(1000*60*60*24)));
      } else if(rec.status === 'Pool'){
        if(inYear)  daysPoolYear  += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfYear))/(1000*60*60*24)));
        if(inMonth) daysPoolMonth += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfMonth))/(1000*60*60*24)));
      } else if(rec.status === 'Under MNT'){
        if(inYear)  daysMntYear  += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfYear))/(1000*60*60*24)));
        if(inMonth) daysMntMonth += Math.min(days, Math.round((Math.min(nextDate,now)-Math.max(recDate,startOfMonth))/(1000*60*60*24)));
      }
    }

    const daysInMonth = now.getDate();
    const daysInYear  = Math.round((now - startOfYear)/(1000*60*60*24));
    const utilMonth = daysInMonth>0 ? Math.round(daysOnJobMonth/daysInMonth*100) : 0;
    const utilYear  = daysInYear>0  ? Math.round(daysOnJobYear/daysInYear*100)   : 0;

    const monthName = now.toLocaleString('en',{month:'long'});
    const year = now.getFullYear();

    document.getElementById('eq-details-body').innerHTML = `
    <!-- Current Status -->
    <div style="margin-bottom:16px">
      <div class="slbl" style="margin-bottom:8px">Current Status</div>
      <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--s2);border-radius:10px">
        <span class="bdg ${statusColor}" style="font-size:13px;padding:6px 14px">${currentStatus}</span>
        <div style="font-size:11px;color:var(--t2)">
          Since ${history.length>0?history[0].date:'—'}
          ${history.length>0&&history[0].jobId?'· '+history[0].jobId:''}
        </div>
      </div>
    </div>

    <!-- PM Dates -->
    <div style="margin-bottom:16px">
      <div class="slbl" style="margin-bottom:8px">Preventive Maintenance</div>
      <div style="background:var(--s2);border-radius:10px;padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:600;color:var(--t1)">PM-II</span>
          <div style="text-align:right;font-size:11px">${pmBadge(pm2Date)}
            ${canEditPM?'<button onclick="openEditPMFromEl(this)" data-eqid="'+eqId+'" data-pm="PM-II" data-date="'+pm2Date+'" style="margin-left:8px;background:var(--s3);color:var(--t2);border:none;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer">Edit</button>':''}
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
          <span style="font-size:11px;font-weight:600;color:var(--t1)">PM-III</span>
          <div style="text-align:right;font-size:11px">${pmBadge(pm3Date)}
            ${canEditPM?'<button onclick="openEditPMFromEl(this)" data-eqid="'+eqId+'" data-pm="PM-III" data-date="'+pm3Date+'" style="margin-left:8px;background:var(--s3);color:var(--t2);border:none;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer">Edit</button>':''}
          </div>
        </div>
      </div>
    </div>

    <!-- Utilization -->
    <div style="margin-bottom:16px">
      <div class="slbl" style="margin-bottom:8px">Utilization</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${monthName} — On Job</div>
          <div style="font-size:24px;font-weight:700;color:var(--green)">${daysOnJobMonth}</div>
          <div style="font-size:10px;color:var(--t3)">days · ${utilMonth}%</div>
        </div>
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${year} — On Job</div>
          <div style="font-size:24px;font-weight:700;color:var(--blue)">${daysOnJobYear}</div>
          <div style="font-size:10px;color:var(--t3)">days · ${utilYear}%</div>
        </div>
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${monthName} — Pool</div>
          <div style="font-size:24px;font-weight:700;color:var(--t1)">${daysPoolMonth}</div>
          <div style="font-size:10px;color:var(--t3)">days available</div>
        </div>
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${monthName} — MNT</div>
          <div style="font-size:24px;font-weight:700;color:var(--amber)">${daysMntMonth}</div>
          <div style="font-size:10px;color:var(--t3)">days maintenance</div>
        </div>
      </div>
      <div style="background:var(--s2);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--t2)">Total days on job (all time)</span>
        <span style="font-size:16px;font-weight:700;color:var(--green)">${daysOnJobTotal} days</span>
      </div>
    </div>

    <!-- History -->
    <div class="slbl" style="margin-bottom:8px">Status History</div>
    ${history.length===0?'<div class="empty">No history recorded yet</div>':
      history.map(h=>{
        const sc=h.status==='On Job'?'b':h.status==='Pool'?'g':h.status==='Under MNT'?'a':h.status==='Transferred'?'t':'gray';
        return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <span class="bdg ${sc}" style="min-width:80px;text-align:center;font-size:10px">${h.status}</span>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--t1)">${h.date}</div>
            ${h.jobId?`<div style="font-size:10px;color:var(--t2)">${h.jobId}</div>`:''}
            ${h.notes?`<div style="font-size:10px;color:var(--t3)">${h.notes}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    `;
  } catch(e){
    document.getElementById('eq-details-body').innerHTML = '<div style="color:var(--red);padding:12px">Error loading history: '+e.message+'</div>';
  }
}

    <div style="background:var(--s1);border-radius:14px;padding:20px;width:100%;max-width:400px;border:1px solid var(--border2)">
      <div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px">Transfer Equipment</div>

async function returnToPool(eqId, btn){
  if(!confirm('Return '+eqId+' to Pool?')) return;
  btn.textContent='...'; btn.disabled=true;
  const res = await post({
    action:'setEquipmentStatus', 
    equipmentId:eqId, 
    status:'Active',
    returnFromTransfer: true,
    returnedBy: USER.username
  });
  if(res.success){
    document.getElementById('eqbdg-'+eqId).textContent='Active';
    document.getElementById('eqbdg-'+eqId).className='bdg g';
    btn.style.background='var(--red)'; 
    btn.textContent='Remove'; 
    btn.disabled=false;
    btn.setAttribute('onclick',`removeFromPool('${eqId}',this)`);
    // Add Transfer button back
    const row = document.getElementById('eqrow-'+eqId);
    if(row){
      const btnDiv = row.querySelector('div[style*="display:flex"]');
      if(btnDiv){
        const trBtn = document.createElement('button');
        trBtn.textContent='Transfer';
        trBtn.style.cssText='background:var(--teal);color:#fff;border:none;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;font-weight:600';
        trBtn.onclick=()=>openTransfer(eqId);
        btnDiv.appendChild(trBtn);
      }
    }
  } else { btn.textContent='↩ Return to Pool'; btn.disabled=false; }
}

async function confirmTransfer(eqId){
  const date = document.getElementById('tr-date').value;
  const note = document.getElementById('tr-note').value.trim();
  if(!note){ alert('Please add transfer notes'); return; }
  const btn = document.querySelector('#transfer-modal button');
  btn.textContent = 'Transferring...'; btn.disabled = true;
  const res = await post({action:'transferEquipment', equipmentId:eqId, transferDate:date, notes:note, transferredBy:USER.username});
  document.getElementById('transfer-modal').remove();
  if(res.success){
    // Update badge
    const bdg = document.getElementById('eqbdg-'+eqId);
    if(bdg){ bdg.textContent='Transferred'; bdg.className='bdg gray'; }
    alert('✓ Equipment '+eqId+' transfer recorded.');
  } else {
    alert('Error: '+(res.error||'Transfer failed'));
  }
}

async function addToPool(eqId, btn){
  btn.textContent='...'; btn.disabled=true;
  const res = await post({action:'setEquipmentStatus', equipmentId:eqId, status:'Active'});
  if(res.success){
    document.getElementById('eqbdg-'+eqId).textContent='Active';
    document.getElementById('eqbdg-'+eqId).className='bdg g';
    btn.style.background='var(--red)'; btn.textContent='Remove'; btn.disabled=false;
    btn.setAttribute('onclick',`removeFromPool('${eqId}',this)`);
  } else { btn.textContent='+ Pool'; btn.disabled=false; }
}

async function removeFromPool(eqId, btn){
  btn.textContent='...'; btn.disabled=true;
  const res = await post({action:'setEquipmentStatus', equipmentId:eqId, status:'Standby'});
  if(res.success){
    document.getElementById('eqbdg-'+eqId).textContent='Standby';
    document.getElementById('eqbdg-'+eqId).className='bdg gray';
    btn.style.background='var(--green)'; btn.textContent='+ Pool'; btn.disabled=false;
    btn.setAttribute('onclick',`addToPool('${eqId}',this)`);
  } else { btn.textContent='Remove'; btn.disabled=false; }
}


async function renderAlerts(c){
  document.getElementById('tb-title').textContent='Alerts';
  const[pmR,exR]=await Promise.all([
    get({action:'getPMAlerts',department:USER.department||'All'}),
    get({action:'getExemptions'})
  ]);
  const pm=pmR.alerts||[];
  const ex=(exR.exemptions||[]).filter(function(e){return e.status&&e.status.includes('Active');});
  const canEditPM = USER.role==='Cell Leader'||USER.role==='MNT Manager';

  // Group PM alerts by equipment type
  var byType={};
  pm.forEach(function(a){
    var t=a.type||'Other';
    if(!byType[t]) byType[t]=[];
    byType[t].push(a);
  });

  var typeOrder=['Control Cabin','Power Pack','Injector','Gooseneck','Stripper',
    'Work Reel','BOP','Fluid Pump','Nitrogen Pump','C-Pump','Batch Mixer',
    'Frac Tank','Skid Tank','Acid Transporter','Trailer Mounted'];

  var sortedTypes=Object.keys(byType).sort(function(a,b){
    var ai=typeOrder.indexOf(a), bi=typeOrder.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });

  function alertRow(a){
    var cls=a.status==='Overdue'?'r':a.status==='Critical'?'r':'a';
    var icon=a.status==='Overdue'?'🔴':a.status==='Critical'?'🟠':'⚠️';
    var daysText=a.daysLeft<0?'OVERDUE '+Math.abs(a.daysLeft)+' days':a.daysLeft+' days left';
    var editBtn = canEditPM
      ? '<button onclick="openEditPMFromEl(this)" data-eqid="'+a.equipmentId+'" data-pm="'+a.pmType+'" data-date="'+a.dueDate+'" '
        +'style="margin-left:8px;flex-shrink:0;background:var(--s3);color:var(--t2);border:none;border-radius:5px;'
        +'padding:3px 8px;font-size:10px;cursor:pointer">Edit</button>'
      : '';
    return '<div class="alert '+cls+'" style="align-items:center" onclick="openEqDetailsFromEl(this)" data-eqid="'+a.equipmentId+'" data-eqtype="'+a.type+'" data-serial="">'
      +'<span class="alert-icon" style="pointer-events:none">'+icon+'</span>'
      +'<div style="flex:1;pointer-events:none">'
      +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">'
      +'<strong>'+a.equipmentId+'</strong>'
      +'<span style="font-size:10px;background:var(--s3);padding:1px 6px;border-radius:4px">'+a.pmType+'</span>'
      +'</div>'
      +'<div style="font-size:11px;margin-top:2px">Due <strong>'+a.dueDate+'</strong> — '+daysText+'</div>'
      +'</div>'
      +editBtn
      +'</div>';
  }

  // Build filter chips
  var filterHTML = '';
  if(sortedTypes.length > 1){
    filterHTML = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:10">'
      +'<button class="bdg b" onclick="filterPMType(this,this.dataset.t)" data-t="all" data-active="true" '
      +'style="cursor:pointer;padding:5px 12px;font-size:11px;border:none">All ('+pm.length+')</button>';
    sortedTypes.forEach(function(t){
      var tk=t.replace(/[^a-zA-Z0-9]/g,'');
      filterHTML += '<button class="bdg gray" onclick="filterPMType(this,this.dataset.t)" data-t="'+tk+'" '
        +'style="cursor:pointer;padding:5px 10px;font-size:10px;border:none">'+t+' ('+byType[t].length+')</button>';
    });
    filterHTML += '</div>';
  }

  // Build grouped alerts HTML
  var pmHTML = '';
  if(pm.length===0){
    pmHTML='<div class="empty">No PM alerts</div>';
  } else {
    sortedTypes.forEach(function(t){
      var typeKey = t.replace(/[^a-zA-Z0-9]/g,'');
      pmHTML += '<div class="pm-type-group" data-type="'+typeKey+'">'
        +'<div class="slbl">'+t+' ('+byType[t].length+')</div>';
      byType[t].forEach(function(a){ pmHTML += alertRow(a); });
      pmHTML += '</div>';
    });
  }

  var exHTML = '';
  if(ex.length>0){
    exHTML = '<div class="slbl" style="margin-top:12px">Active exemptions ('+ex.length+')</div>';
    ex.forEach(function(e){
      exHTML += '<div class="alert a"><span class="alert-icon">📋</span>'
        +'<div><strong>'+e.jobId+'</strong> — '+(e.reason||'Exemption')+'<br>'
        +'<span style="font-size:10px;color:var(--t2)">Expires: '+(e.expiryDate||'—')+'</span></div></div>';
    });
  }

  c.innerHTML = filterHTML
    +'<div class="slbl">PM Alerts ('+pm.length+')</div>'
    +pmHTML+exHTML;
}

async function renderMNTList(c){

  var underMNT = recs.filter(function(r){return r.status==='Under MNT';});

  function mntCard(r){
    var sc = r.status==='Under MNT'?'a':r.status==='Pending QAQC'?'b':'g';

      btns = '<button onclick="openMntAction(this)" data-mntid="'+r.mntId+'" data-eqid="'+r.equipmentId+'"'

        +'✓ Mark done — Send to QAQC</button>';

    return '<div class="card" style="margin-bottom:8px;padding:12px 13px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:600;color:var(--t1);font-family:monospace">'+r.equipmentId+'</div>'
      +'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+r.equipmentType+' · '+r.mntType+'</div>'
      +'<div style="font-size:10px;color:var(--t3);margin-top:2px">Started: '+r.startDate+'</div>'
      +(r.reason?'<div style="font-size:11px;color:var(--amber);margin-top:4px">Reason: '+r.reason+'</div>':'')
      +'</div>'
      +'<span class="bdg '+sc+'">'+r.status+'</span>'
      +'</div>'
      +(btns?'<div style="margin-top:10px">'+btns+'</div>':'')
      +'</div>';
  }

  var html2 = '';
  if(underMNT.length>0){
    html2 += '<div class="slbl">Under MNT ('+underMNT.length+')</div>';
    underMNT.forEach(function(r){ html2 += mntCard(r); });
  }

  c.innerHTML = html2;
}

function buildJobForm(ctuId, pool){
  const el = document.getElementById('pkg-comps');
  const n2el = document.getElementById('pkg-n2');
  const btn = document.getElementById('cj-submit');
  if(!el) return;

  // Equipment types in order
  const SINGLE_TYPES = ['Control Cabin','Power Pack','Injector','Gooseneck','Stripper'];
  const QTY_TYPES = ['Work Reel','BOP','Fluid Pump'];

  // Build single-select rows (1 dropdown per type)
  let singleRows = '';
  SINGLE_TYPES.forEach(type=>{
    const items = pool[type]||[];
    const key = type.replace(/[^a-zA-Z0-9]/g,'');
    singleRows += `
    <div style="padding:10px 13px;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--t1)">${type}</span>
        <span style="font-size:10px;color:var(--t2)">${items.length} available</span>
      </div>
      <select class="finput" id="single-sel-${key}" style="font-size:12px;padding:8px 10px;cursor:pointer">
        <option value="">— Select ${type} —</option>
        ${items.map(p=>`<option value="${p.id}">${p.id}</option>`).join('')}
      </select>
    </div>`;
  });

  // Build qty-selector rows (BOP / Work Reel / Fluid Pump)
  let qtyRows = '';
  QTY_TYPES.forEach(type=>{
    const items = pool[type]||[];
    const key = type.replace(/[^a-zA-Z0-9]/g,'');
    const maxQty = Math.min(items.length, type==='BOP'?3:type==='Work Reel'?2:3);
    qtyRows += `
    <div style="padding:10px 13px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600;color:var(--t1)">${type}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--t2)">How many?</span>
          <select class="finput" id="qty-${key}" data-type="${type}"
            onchange="updateQtySlots(this.dataset.type)"
            style="width:70px;padding:6px 8px;font-size:13px;cursor:pointer">
            ${Array.from({length:maxQty+1},(_,i)=>
              `<option value="${i}"${i===maxQty?' selected':''}>${i}</option>`
            ).join('')}
          </select>
        </div>
      </div>
      <div id="qty-slots-${key}"></div>
    </div>`;
  });

  el.innerHTML = `
  <div class="slbl" style="margin-bottom:8px">CTU equipment — ${ctuId}</div>
  <div class="card" style="margin-bottom:10px">
    ${singleRows}
    ${qtyRows}
  </div>`;

  // Initialize qty slots with default quantities
  QTY_TYPES.forEach(t=>updateQtySlots(t));

  // Nitrogen + Aux section
  const n2Pool = pool['Nitrogen Pump']||[];
  if(n2el){
    n2el.innerHTML = `
    <div class="slbl" style="margin-bottom:8px">Nitrogen Unit</div>
    <div class="card" style="margin-bottom:12px;padding:12px 13px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;font-weight:600;color:var(--t1)">How many Nitrogen Units?</span>
        <select class="finput" id="n2-qty" onchange="updateN2Slots()"
          style="width:80px;padding:6px 8px;font-size:13px;cursor:pointer">
          <option value="0">0</option><option value="1">1</option>
          <option value="2">2</option><option value="3">3</option>
        </select>
      </div>
      <div id="n2-slots"></div>
    </div>

    <div class="slbl" style="margin-bottom:8px">Auxiliary Equipment</div>
    <div class="card" style="margin-bottom:12px;padding:12px 13px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:13px;font-weight:600;color:var(--t1)">Include Aux Equipment?</span>
        <div style="display:flex;gap:8px">
          <button id="aux-yes" onclick="toggleAux(true)"
            style="padding:7px 18px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:var(--s3);color:var(--t2)">YES</button>
          <button id="aux-no" onclick="toggleAux(false)"
            style="padding:7px 18px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff">NO</button>
        </div>
      </div>
      <div id="aux-list" style="display:none">
        ${['C-Pump','Batch Mixer','Frac Tank','Skid Tank','Acid Transporter','Trailer Mounted'].map(t=>{
          const k=t.replace(/[^a-zA-Z0-9]/g,'');
          const avail=(pool[t]||[]).length;
          return `<div style="border-top:1px solid var(--border);padding:10px 0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:12px;font-weight:600;color:var(--t1)">${t} <span style="color:var(--t3);font-weight:400">(${avail} avail)</span></span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;color:var(--t2)">Qty:</span>
                <select class="finput" id="aux-qty-${k}" onchange="updateAuxSlots('${t}')"
                  style="width:70px;padding:6px 8px;font-size:13px;cursor:pointer">
                  ${Array.from({length:Math.min(avail,8)+1},(_,i)=>`<option value="${i}">${i}</option>`).join('')}
                </select>
              </div>
            </div>
            <div id="aux-slots-${k}"></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if(btn) btn.style.display='flex';
  window._currentCTU = ctuId;
}

function updateQtySlots(typeOrEl){
  const type = typeof typeOrEl==='string'?typeOrEl:(typeOrEl&&typeOrEl.dataset?typeOrEl.dataset.type:typeOrEl);
  const key = type.replace(/[^a-zA-Z0-9]/g,'');
  const qty = parseInt((document.getElementById('qty-'+key)||{value:'0'}).value)||0;
  const pool = window._poolData||{};
  const poolItems = pool[type]||[];
  const container = document.getElementById('qty-slots-'+key);
  if(!container) return;
  let html = '';
  for(let i=1;i<=qty;i++){
    html += '<div style="margin-bottom:6px">'
      +'<select class="finput" id="qty-sel-'+key+'-'+i+'" style="font-size:12px;padding:8px 10px;cursor:pointer">'
      +'<option value="">— Select '+type+' —</option>'
      +poolItems.map(p=>'<option value="'+p.id+'">'+p.id+'</option>').join('')
      +'</select></div>';
  }
  container.innerHTML = html;
}

function updateN2Slots(){

  container.innerHTML=html;
}

function toggleAux(show){
  const list=document.getElementById('aux-list');

  if(list)list.style.display=show?'block':'none';

function updateAuxSlots(type){
  const key=type.replace(/[^a-zA-Z0-9]/g,'');

async function approveReq(requestId, role, notes, btnEl){
  if(btnEl){ btnEl.textContent='Approving...'; btnEl.disabled=true; }
  try{
    var res = await post({
      action: 'approveJobRequest',
      requestId: requestId,
      role: role,
      notes: notes||'',
      approvedBy: USER.username
    });
    if(res.success){
      alert('✓ Request approved!');
      Object.keys(CACHE).forEach(function(k){delete CACHE[k];});
      loadView('home');
    } else {
      alert('Error: '+(res.error||'Approval failed'));
      if(btnEl){ btnEl.textContent='✓ Approve'; btnEl.disabled=false; }
    }
  } catch(e){
    alert('Connection error: '+e.message);
    if(btnEl){ btnEl.textContent='✓ Approve'; btnEl.disabled=false; }
  }
}

async function rejectReq(requestId, role, notes, btnEl){
  if(!notes||notes.trim()===''){
    alert('Please add a reason for rejection in the notes field');
    return;
  }
  if(btnEl){ btnEl.textContent='Rejecting...'; btnEl.disabled=true; }
  try{
    var res = await post({
      action: 'rejectJobRequest',
      requestId: requestId,
      role: role,
      notes: notes||'',
      rejectedBy: USER.username
    });
    if(res.success){
      alert('Request rejected.');
      Object.keys(CACHE).forEach(function(k){delete CACHE[k];});
      loadView('home');
    } else {
      alert('Error: '+(res.error||'Rejection failed'));
      if(btnEl){ btnEl.textContent='✗ Reject'; btnEl.disabled=false; }
    }
  } catch(e){
    alert('Connection error: '+e.message);
    if(btnEl){ btnEl.textContent='✗ Reject'; btnEl.disabled=false; }
  }
}

async function submitJobRequest(){
  var well = (document.getElementById('cj-w')||{value:''}).value.trim();
  var rig  = (document.getElementById('cj-r')||{value:''}).value.trim();
  var mob  = (document.getElementById('cj-m')||{value:''}).value;
  var pkgId = (document.getElementById('cj-p')||{value:''}).value;
  if(!well||!rig||!pkgId||!mob){ alert('Please fill all required fields and select a package'); return; }

  // Collect single-select equipment (Control Cabin, Power Pack, Injector, Gooseneck, Stripper)
  var selectedEq = [];
  ['ControlCabin','PowerPack','Injector','Gooseneck','Stripper'].forEach(function(key){
    var sel = document.getElementById('single-sel-'+key);
    if(sel && sel.value) selectedEq.push(sel.value);
  });

  // Collect BOP / Work Reel / Fluid Pump from qty selectors
  ['WorkReel','BOP','FluidPump'].forEach(function(key){
    var qty = parseInt((document.getElementById('qty-'+key)||{value:'0'}).value)||0;
    for(var i=1;i<=qty;i++){
      var sel = document.getElementById('qty-sel-'+key+'-'+i);
      if(sel && sel.value) selectedEq.push(sel.value);
    }
  });

  // Collect Nitrogen Units
  var n2Qty = parseInt((document.getElementById('n2-qty')||{value:'0'}).value)||0;
  for(var i=1;i<=n2Qty;i++){
    var sel = document.getElementById('n2-sel-'+i);
    if(sel && sel.value) selectedEq.push(sel.value);
  }

  // Collect Aux Equipment
  var auxList = document.getElementById('aux-list');
  if(auxList && auxList.style.display!=='none'){
    ['CPump','BatchMixer','FracTank','SkidTank','AcidTransporter','TrailerMounted'].forEach(function(key){
      var qty = parseInt((document.getElementById('aux-qty-'+key)||{value:'0'}).value)||0;
      for(var i=1;i<=qty;i++){
        var sel = document.getElementById('aux-sel-'+key+'-'+i);
        if(sel && sel.value) selectedEq.push(sel.value);
      }
    });
  }

  if(selectedEq.length === 0){ alert('Please select at least one equipment item'); return; }

  var btn = document.getElementById('cj-submit');
  if(btn){ btn.textContent='Submitting...'; btn.disabled=true; }

  try{
    var res = await post({
      action: 'submitJobRequest',
      packageId: pkgId,
      ctuNumber: pkgId,
      department: USER.department,
      cellLeader: USER.username,
      wellNumber: well,
      rigNumber: rig,
      mobDate: mob,
      equipmentList: selectedEq
    });
    if(res.success){
      alert('Job request submitted! Waiting for Asset Manager approval.');
      goBack();
    } else {
      alert('Error: '+(res.error||'Submission failed'));
      if(btn){ btn.textContent='Submit for Asset Manager approval →'; btn.disabled=false; }
    }
  } catch(e){
    alert('Connection error: '+e.message);
    if(btn){ btn.textContent='Submit for Asset Manager approval →'; btn.disabled=false; }
  }
}
